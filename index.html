            // ── PROCESS SIGNAL ──
            function processSignal(id, price) {
                const s = state[id];
                if (!s) return;
                if (Date.now() < (s.cooldownUntil || 0)) return;
                buildCandles(id, price);

                // ── Confirmed signal monitor ──
                if (s.confirmed && s.type !== 'none') {
                    if (!s.tempHigh) { s.tempHigh = s.entry;
                        s.tempLow = s.entry; }
                    if (price > s.tempHigh) s.tempHigh = price;
                    if (price < s.tempLow) s.tempLow = price;
                    updateTracker(id, price);

                    const hitTP = (s.type === 'buy' && price >= s.tp) || (s.type === 'sell' && price <= s.tp);
if (hitTP) {
    recordSignalResult(id, 'tp');
    state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_TP_MS;
    resetSignal(id);
    return;
}
                    const hitSL = (s.type === 'buy' && price <= s.sl) || (s.type === 'sell' && price >= s.sl);
                    if (hitSL) {
                        const result = s.breakevenArmed ? 'be' : 'sl';
                        recordSignalResult(id, result);
                        if (result === 'sl') state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
                        resetSignal(id);
                        return;
                    }

                    if (!s.breakevenArmed && Date.now() > (s.warmupUntil || 0)) {
                        const tpDist = Math.abs(s.tp - s.entry);
                        const moved = s.type === 'buy' ? price - s.entry : s.entry - price;
                        if (moved >= tpDist * 0.40) {
                            s.sl = s.entry;
                            s.breakevenArmed = true;
                            throttledSaveState(id);
                            showToast(`${id.toUpperCase()} 🔒 TP1 ARMED @ ${s.entry.toFixed(2)}`);
                        }
                    }
                    return;
                }

                if (pendingConfirmation[id]) { s.lastPrice = price; return; }

                const macroCandles = getMacroCandles(id);
                const microCandles = getMicroCandles(id);
                if (macroCandles.length < MACRO_MIN) { s.lastPrice = price; return; }
                if (microCandles.length < MICRO_MIN) { s.lastPrice = price; return; }

                // ── Run Engine ──
                const engineResult = scoreEngine(price, macroCandles);
                engineCache[id] = engineResult;
                updateEngineBadges(id, engineResult);
                updateConfluenceBar(id, engineResult.confidence);
                updatePatternEngineUI(id, engineResult);

                const direction = engineResult.signal === 'BUY' ? 'buy' : engineResult.signal === 'SELL' ? 'sell' : 'none';

                // ── L1: Bias ──
                if (!s.l1 && direction !== 'none') {
                    s.l1 = true;
                    s.type = direction;
                    s.confluenceScore = engineResult.confidence;
                    pendingSignalData[id] = true;
                    throttledUpdateUI(id);
                    throttledSaveState(id);
                    return;
                }

                // ── L2: Ready ──
                if (s.l1 && !s.l2 && engineResult.confidence > 45) {
                    s.l2 = true;
                    pendingSignalData[id] = true;
                    throttledUpdateUI(id);
                    throttledSaveState(id);
                    return;
                }

                // ── L3: Lock ──
                if (s.l2 && !s.l3 && engineResult.confidence > 60) {
                    s.l3 = true;
                    pendingSignalData[id] = true;
                    throttledUpdateUI(id);
                    throttledSaveState(id);
                    startConfirmationDelay(id, direction, price, engineResult.confidence);
                    return;
                }

                // Reset L2 jika confidence turun
                if (s.l2 && !s.l3 && engineResult.confidence < 35) {
                    s.l2 = false;
                    pendingSignalData[id] = true;
                    throttledUpdateUI(id);
                }

                s.lastPrice = price;
                throttledSaveState(id);
            }

            // ── CONFIRMATION DELAY ──
            function startConfirmationDelay(id, direction, entryPrice, confScore) {
                if (pendingConfirmation[id]) cancelPendingConfirmation(id);
                pendingConfirmation[id] = { direction, entryPrice, confScore };
                const sb = document.getElementById(`signal-bar-${id}`);
                if (sb) sb.classList.add('confirm-wait');
                document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
                updateSignalUIOnly(id);

                pendingConfirmation[id].timerId = setTimeout(() => {
                    if (!pendingConfirmation[id]) return;
                    const lp = marketData[id].price || state[id].lastPrice || 0;
                    const macroC = getMacroCandles(id);
                    const microC = getMicroCandles(id);
                    if (macroC.length >= MACRO_MIN && microC.length >= MICRO_MIN) {
                        const eng = scoreEngine(lp, macroC);
                        const stillValid = eng.signal === (direction === 'buy' ? 'BUY' : 'SELL') && eng.confidence > 50;
                        if (stillValid) {
                            executeLockSignal(id, direction, lp, eng.confidence);
                        } else {
                            resetSignal(id);
                            const st = document.getElementById(`signal-text-${id}`);
                            if (st) { st.innerText = 'REJECT';
                                st.style.color = 'var(--danger)';
                                setTimeout(() => updateSignalUIOnly(id), 1500); }
                        }
                    } else { resetSignal(id); }
                    pendingConfirmation[id] = null;
                }, CONFIRMATION_WAIT_MS);
            }

            // ── EXECUTE LOCK ──
            function executeLockSignal(id, direction, livePrice, confScore) {
                const s = state[id];
                const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
                if (entry <= 0) return;
                const atr = marketData[id].atr || 200;
                const slDist = Math.max(atr * 0.85, 200);
                const rr = calcDynamicRR(entry, atr);
                const tpDist = slDist * rr;

                s.l3 = true;
                s.confirmed = true;
                s.confirmedAt = Date.now();
                s.warmupUntil = Date.now() + 3000;
                s.type = direction;
                s.entry = entry;
                s.originPrice = entry;
                s.tempHigh = entry;
                s.tempLow = entry;
                s.confluenceScore = confScore;
                s.entryZone = 'STRUCTURE';
                s.breakevenArmed = false;
                s.rr_used = rr;

                if (direction === 'buy') { s.sl = entry - slDist;
                    s.tp = entry + tpDist; } else { s.sl = entry + slDist;
                    s.tp = entry - tpDist; }

                throttledSaveState(id);
                pendingSignalData[id] = true;
                throttledUpdateUI(id);
                document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | RR:${rr.toFixed(1)}`);
            }

            // ── CARD HTML ──
            function buildCardHTML(id, label) {
                return `<div class="pair-card" id="card-${id}">
              <div class="card">
                <div class="card-top">
                  <div class="pair-info">
                    <span class="pair">${label}</span>
                    <div class="status-row">
                      <span id="ws-status-${id}" class="ws-status ${id==='btc'?'connected':'disconnected'}">${id==='btc'?'● CONNECTING...':'○ RECONNECTING...'}</span>
                      <span class="feed-badge" id="feed-badge-${id}">○ INIT</span>
                    </div>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;">
                    <span class="price" id="price-${id}">0.00</span>
                    <span class="tracker-badge" id="tracker-${id}">0</span>
                  </div>
                </div>
                <div class="signal-bar" id="signal-bar-${id}">
                  <span>SIGNAL</span>
                  <div class="signal-center-slot">
                    <div class="signal-dot-group" id="signal-dot-group-${id}">
                      <div class="dot" id="l1-${id}"></div>
                      <div class="dot" id="l2-${id}"></div>
                      <div class="dot" id="l3-${id}"></div>
                    </div>
                    <span class="signal-timer-inline" id="timeout-${id}"></span>
                  </div>
                  <span id="signal-text-${id}">— WAIT</span>
                </div>
                <div class="card-level-grid">
                  <div class="level-item" onclick="window.copyValue('${id}','entry')">
                    <span class="level-label">Entry</span><span class="level-value" id="entry-${id}">--</span>
                  </div>
                  <div class="level-item" onclick="window.copyValue('${id}','tp')">
                    <span class="level-label">Target</span><span class="level-value" id="tp-${id}" style="color:var(--success)">--</span>
                  </div>
                  <div class="level-item" onclick="window.copyValue('${id}','sl')">
                    <span class="level-label">Deep</span><span class="level-value" id="sl-${id}" style="color:var(--danger)">--</span>
       </div>                  
           </div>
        <div class="engine-badge-row">
                  <span class="ebadge off" id="eb-trend-${id}">TRD</span>
                  <span class="ebadge off" id="eb-struct-${id}">STR</span>
                  <span class="ebadge off" id="eb-choch-${id}">CH</span>
                  <span class="ebadge off" id="eb-fvg-${id}">FVG</span>
                  <span class="ebadge off" id="eb-liq-${id}">LIQ</span>
                  <span class="ebadge off" id="eb-pa-${id}">PA</span>
                  <span class="ebadge score" id="eb-score-${id}">SIG</span>
                </div>
                
      <!-- PDE PANEL (DISEDERHANAKAN) -->
                <div class="pde-panel">
                  <div class="pde-header">
                    <span class="pde-title">Pattern Engine</span>
                    <span class="pde-signal-badge neutral" id="pde-signal-${id}">— WAIT</span>
                  </div>
                  <div class="pde-pattern-row">
                    <div class="pde-pattern-name" id="pde-pattern-${id}">Scanning...</div>
                  </div>
                  <div class="pde-meters-grid">
                    <div class="pde-meter-item">
                      <span class="pde-meter-label">STRENGTH</span>
                      <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-str-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
                      <span class="pde-meter-val" id="pde-meter-str-val-${id}" style="color:var(--text-dim)">0%</span>
                    </div>
                    <div class="pde-meter-item">
                      <span class="pde-meter-label">PROBABILITY</span>
                      <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-prob-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
                      <span class="pde-meter-val" id="pde-meter-prob-val-${id}" style="color:var(--text-dim)">0%</span>
                    </div>
                    <div class="pde-meter-item">
                      <span class="pde-meter-label">RISK</span>
                      <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-risk-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
     <span class="pde-meter-val" id="pde-meter-risk-val-${id}" style="color:var(--text-dim)">—</span>
      </div>
          </div>                  

         <div class="stats-grid" id="history-panel-${id}">
                  <div class="stats-item"><span class="stats-label" style="color:var(--gold)">TP1</span><span class="stats-value be-value" id="stats-retrace-${id}">0</span></div>
                  <div class="stats-item"><span class="stats-label">TP2</span><span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span></div>
                  <div class="stats-item"><span class="stats-label">SL HIT</span><span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span></div>
                  <div class="stats-item"><span class="stats-label" style="color:var(--gold)">WINRATE</span><span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span></div>
                </div>
              </div>
            </div>`;
            }

            window.copyValue = (id, type) => {
                const val = document.getElementById(`${type}-${id}`)?.innerText;
                if (val && val !== '--') {
                    navigator.clipboard?.writeText(val).then(() => showToast(`${type.toUpperCase()} copied: ${val}`))
                        .catch(() => showToast(val));
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            };

            // ── PRICE FEEDS ──
            let btcWs = null,
                btcReconnectTimer = null,
                btcReconnectAttempts = 0;
            let btcFetchRetryTimer = null,
                btcCurrentPrice = 0,
                btcLastHeartbeat = Date.now();
            const BTC_REST_SOURCES = [
                { url: 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT', parse: (d) => d?.price ? parseFloat(d
                        .price) : null },
                { url: 'https://fapi.binance.com/fapi/v1/ticker/price?symbol=BTCUSDT', parse: (d) => d?.price ? parseFloat(
                        d.price) : null }
            ];
            let btcRestIdx = 0;

            function updateBTCDisplay(price, feedStatus, vol) {
                if (!price || isNaN(price) || price < 1000 || price > 2000000) return;
                price = price + PRICE_OFFSET_BTC;
                btcCurrentPrice = price;
                btcLastHeartbeat = Date.now();
                pendingPriceData.btc = price;
                pendingSignalData.btc = true;
                throttledUpdateUI('btc');
                updateSignal('btc', price, vol || 0);
                wsStatus.btc = true;
                updateGlobalPulse();
                const el = document.getElementById('ws-status-btc');
                if (el) { el.textContent = '● LIVE';
                    el.className = 'ws-status connected'; }
                if (feedStatus) updateFeedBadge('btc', feedStatus);
            }

            async function btcFetchRestPrice() {
                if (btcFetching) return;
                btcFetching = true;
                try {
                    for (let i = 0; i < BTC_REST_SOURCES.length; i++) {
                        const src = BTC_REST_SOURCES[(btcRestIdx + i) % BTC_REST_SOURCES.length];
                        try {
                            const ctrl = new AbortController();
                            const tid = setTimeout(() => ctrl.abort(), 7000);
                            const resp = await fetch(src.url, { signal: ctrl.signal });
                            clearTimeout(tid);
                            if (!resp.ok) continue;
                            const data = await resp.json();
                            const p = src.parse(data);
                            if (p && p > 1000 && !isNaN(p)) {
                                updateBTCDisplay(p, i === 0 ? 'ok' : 'fallback', 0);
                                btcRestIdx = (btcRestIdx + i) % BTC_REST_SOURCES.length;
                                return true;
                            }
                        } catch (e) {}
                    }
                    wsStatus.btc = false;
                    updateGlobalPulse();
                    updateSignalUIOnly('btc');
                    updateFeedBadge('btc', 'err');
                    return false;
                } finally {
                    btcFetching = false;
                }
            }

            function initBTCWebSocket() {
                if (btcWs) { try { btcWs.close(); } catch (e) {} btcWs = null; }
                if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
                try {
                    btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
                    const wst = setTimeout(() => {
                        if (btcWs && btcWs.readyState !== WebSocket.OPEN) {
                            try { btcWs.close(); } catch (e) {}
                            btcWs = null;
                            wsStatus.btc = false;
                            updateFeedBadge('btc', 'fallback');
                            updateGlobalPulse();
                        }
                    }, 7000);
                    btcWs.onopen = () => {
                        clearTimeout(wst);
                        btcReconnectAttempts = 0;
                        wsStatus.btc = true;
                        updateFeedBadge('btc', 'ok');
                        updateGlobalPulse();
                        updateSignalUIOnly('btc');
                    };
                    btcWs.onmessage = (e) => {
                        try {
                            const d = JSON.parse(e.data);
                            if (d.p) {
                                const p = parseFloat(d.p);
                                if (isNaN(p) || p <= 1000) return;
                                btcLastHeartbeat = Date.now();
                                wsStatus.btc = true;
                                updateGlobalPulse();
                                if (p === rawBtcPrice) return;
                                rawBtcPrice = p;
                                const q = parseFloat(d.q) || 0;
                                updateBTCDisplay(p, 'ok', q);
                            }
                        } catch (err) {}
                    };
                    btcWs.onclose = () => {
                        wsStatus.btc = false;
                        updateGlobalPulse();
                        updateSignalUIOnly('btc');
                        const delay = Math.min(1000 * Math.pow(1.6, btcReconnectAttempts), 20000);
                        btcReconnectAttempts++;
                        btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay);
                        updateFeedBadge('btc', 'fallback');
                    };
                    btcWs.onerror = () => {
                        wsStatus.btc = false;
                        updateFeedBadge('btc', 'fallback');
                        updateGlobalPulse();
                        updateSignalUIOnly('btc');
                    };
                } catch (err) { updateFeedBadge('btc', 'fallback'); }
            }

            function consolidatedPoll() {
                const btcConnected = btcWs && btcWs.readyState === WebSocket.OPEN;
                if (!btcConnected || (Date.now() - btcLastHeartbeat) > 6000) {
                    if (!btcFetching) btcFetchRestPrice();
                }
                updateGlobalPulse();
            }

            // ── INIT ──
            async function init() {
                checkAndMigrateSchema();
                state.btc = loadState('btc');
                performanceStats.btc = loadPerformanceStats('btc');
                updateWinrate('btc');
                document.getElementById('terminals').innerHTML = buildCardHTML('btc', 'BTCUSD');

                const bindTap = (el, handler) => {
                    if (!el) return;
                    let lastTap = 0;
                    const h = (e) => { e.preventDefault();
                        const now = Date.now();
                        if (now - lastTap < 80) return;
                        lastTap = now;
                        handler(); };
                    el.addEventListener('touchstart', h, { passive: false });
                    el.addEventListener('click', h);
                };
                bindTap(document.getElementById('signal-bar-btc'), () => handleSignalBarTap('btc'));
                bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

                updateSignalUIOnly('btc');
                updatePerformanceUI('btc');
                updateFeedBadge('btc', 'fallback');
                const el_btc = document.getElementById('ws-status-btc');
                if (el_btc) { el_btc.textContent = '● LOADING...';
                    el_btc.className = 'ws-status connected'; }

                await initHistoricalCandles('btc');

                initBTCWebSocket();
                await btcFetchRestPrice();

                updateGlobalPulse();

                setInterval(consolidatedPoll, 3000);

                setInterval(() => {
                    const s = state.btc;
                    const dotGroup = document.getElementById('signal-dot-group-btc');
                    const el = document.getElementById('timeout-btc');
                    if (!el || !dotGroup) return;
                    const timerActive = s && s.confirmed && !s.breakevenArmed && s.type !== 'none';
                    if (!timerActive) {
                        dotGroup.style.display = 'flex';
                        el.style.display = 'none';
                        return;
                    }
                    dotGroup.style.display = 'none';
                    el.style.display = 'inline';
                    const elapsed = Date.now() - (s.confirmedAt || 0);
                    const hours = Math.floor(elapsed / 3600000);
                    const minutes = Math.floor((elapsed % 3600000) / 60000);
                    const seconds = Math.floor((elapsed % 60000) / 1000);
                    if (hours > 0) {
                        el.textContent = '+' + String(hours).padStart(2, '0') + ':' + 
                                         String(minutes).padStart(2, '0') + ':' + 
                                         String(seconds).padStart(2, '0');
                    } else {
                        el.textContent = '+' + String(minutes).padStart(2, '0') + ':' + 
                                         String(seconds).padStart(2, '0');
                    }
                    el.className = elapsed >= 30 * 60 * 1000 ? 'signal-timer-inline amber' : 'signal-timer-inline';
                }, 1000);

                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        if (!btcFetching) btcFetchRestPrice();
                        updateSignalUIOnly('btc');
                        updateGlobalPulse();
                    }
                });
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();

        })();
    </script>
</body>
</html>
