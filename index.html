<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport" />
    <title>URADVISOR v0.1 — STRUCTURE ENGINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── CSS SAMA SEPERTI SEBELUMNYA (HANYA DIUBAH LABEL DI HTML) ─── */
        :root {
            --obsidian: #171717;
            --surface: #0000005a;
            --surface2: #002f5832;
            --surface3: #0a0a0c;
            --edge: rgba(255,255,255,0.06);
            --edge-bright: rgba(255,255,255,0.13);
            --gold: #f0a500;
            --gold-dim: rgba(240,165,0,0.13);
            --gold-glow: 0 0 18px rgba(240,165,0,0.22), 0 0 36px rgba(240,165,0,0.07);
            --emerald: #00d98b;
            --emerald-dim: rgba(0,217,139,0.11);
            --emerald-glow: 0 0 14px rgba(0,217,139,0.32);
            --crimson: #FF5773;
            --crimson-dim: rgba(255,64,96,0.11);
            --crimson-glow: 0 0 14px rgba(255,64,96,0.32);
            --amber: #ffb830;
            --violet: #a78bfa;
            --teal: #94a3b8;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --shadow-deep: 0 20px 60px rgba(0,0,0,0.75), 0 6px 20px rgba(0,0,0,0.5);
            --radius: 6px;
            --radius-sm: 3px;
            --success: var(--emerald);
            --danger: var(--crimson);
            --accent: var(--gold);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: var(--obsidian);
            background-image: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(240,165,0,0.035) 0%, transparent 55%),
                radial-gradient(ellipse 50% 35% at 85% 100%, rgba(0,217,139,0.02) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Syne', sans-serif;
            padding: 16px 14px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--edge);
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 55px;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .brand h1 {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
        }
        .brand h1 span {
            color: var(--gold);
        }
        .brand-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.41rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .sys-status {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.44rem;
            text-align: right;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .pulse {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--amber);
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
            animation: blink 1.5s infinite;
        }
        .pulse.connected {
            background: var(--emerald);
            box-shadow: var(--emerald-glow);
        }
        .pulse.disconnected {
            background: var(--crimson);
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.15;
            }
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pair-card {
            display: block;
        }
        .signal-center-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }
        .signal-timer-inline {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-muted);
            display: none;
        }
        .signal-timer-inline.amber {
            color: var(--amber);
        }
        .signal-timer-inline.danger {
            color: var(--crimson);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--edge);
            border-radius: 2px;
            padding: 0;
            margin-bottom: 10px;
            box-shadow: var(--shadow-deep);
            overflow: hidden;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.35;
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 17px 13px;
            background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
            border-bottom: 1px solid var(--edge);
        }
        .pair-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pair {
            font-weight: 800;
            font-size: 0.98rem;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .ws-status {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.41rem;
            padding: 2px 6px;
            border-radius: 2px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid transparent;
        }
        .ws-status.connected {
            color: var(--emerald);
            border-color: rgba(0,217,139,0.2);
            background: rgba(0,217,139,0.05);
        }
        .ws-status.disconnected {
            color: var(--crimson);
            border-color: rgba(255,64,96,0.2);
            background: rgba(255,64,96,0.05);
            animation: blink 1s infinite;
        }
        .feed-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.38rem;
            padding: 2px 6px;
            border-radius: 2px;
            border: 1px solid transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .feed-badge.ok {
            color: var(--emerald);
            border-color: rgba(0,217,139,0.18);
            background: rgba(0,217,139,0.04);
        }
        .feed-badge.fallback {
            color: var(--amber);
            border-color: rgba(255,184,48,0.2);
            background: rgba(255,184,48,0.05);
        }
        .feed-badge.err {
            color: var(--crimson);
            border-color: rgba(255,64,96,0.2);
            background: rgba(255,64,96,0.05);
        }
        .price {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.42rem;
            font-weight: 700;
            text-align: right;
            color: var(--text-primary);
            transition: color 0.12s ease;
            letter-spacing: -0.5px;
            line-height: 1;
            padding-top: 2px;
        }
        .tracker-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            font-weight: 700;
            text-align: right;
            letter-spacing: 0.5px;
            margin-top: 4px;
            background: rgba(0,0,0,0.3);
            padding: 2px 7px;
            border-radius: 2px;
            display: inline-block;
            align-self: flex-end;
        }
        .signal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 17px;
            background: var(--surface2);
            border-bottom: 1px solid var(--edge);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.70rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            color: var(--text-muted);
        }
        .signal-bar.confirm-wait {
            background: rgba(240,165,0,0.04);
            animation: pulseBorder 1s infinite;
        }
        @keyframes pulseBorder {
            0%,
            100% {
                border-bottom-color: rgba(240,165,0,0.08);
            }
            50% {
                border-bottom-color: rgba(240,165,0,0.45);
            }
        }
        .signal-dot-group {
            display: flex;
            gap: 7px;
            align-items: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--surface3);
            border: 1px solid var(--edge);
            transition: all 0.2s ease;
        }
        .dot.active {
            background: var(--emerald);
            border-color: var(--emerald);
            box-shadow: var(--emerald-glow);
        }
        .dot.active-down {
            background: var(--crimson);
            border-color: var(--crimson);
            box-shadow: var(--crimson-glow);
        }
        .dot.confirm-pending {
            background: var(--gold);
            border-color: var(--gold);
            animation: pulseDot 0.8s infinite;
            box-shadow: 0 0 10px rgba(240,165,0,0.5);
        }
        @keyframes pulseDot {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
        .engine-badge-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 17px;
            border-bottom: 1px solid var(--edge);
            background: rgba(0,0,0,0.15);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .engine-badge-row::-webkit-scrollbar {
            display: none;
        }
        .ebadge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.37rem;
            padding: 2px 6px;
            border-radius: 2px;
            border: 1px solid transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .ebadge.off {
            color: var(--text-dim);
            border-color: var(--edge);
            background: transparent;
        }
        .ebadge.bull {
            color: var(--emerald);
            border-color: rgba(0,217,139,0.25);
            background: rgba(0,217,139,0.07);
        }
        .ebadge.bear {
            color: var(--crimson);
            border-color: rgba(255,64,96,0.25);
            background: rgba(255,64,96,0.07);
        }
        .ebadge.neutral {
            color: var(--amber);
            border-color: rgba(255,184,48,0.25);
            background: rgba(255,184,48,0.07);
        }
        .ebadge.active {
            color: var(--violet);
            border-color: rgba(167,139,250,0.3);
            background: rgba(167,139,250,0.08);
        }
        .ebadge.score {
            color: var(--gold);
            border-color: rgba(240,165,0,0.3);
            background: rgba(240,165,0,0.08);
            font-weight: 700;
        }
        .ebadge.pulse {
            animation: badgePulse 1.2s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.55;
                transform: scale(1.08);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .confluence-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 17px;
            border-bottom: 1px solid var(--edge);
            background: rgba(0,0,0,0.1);
        }
        .confluence-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.38rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .confluence-bar-wrap {
            flex: 1;
            height: 1.2px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .confluence-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background 0.3s ease;
            background: var(--text-dim);
        }
        .confluence-score-txt {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 28px;
            text-align: right;
            flex-shrink: 0;
            transition: color 0.3s;
        }
        .card-level-grid {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            border-bottom: 1px solid var(--edge);
        }
        .level-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 11px 7px;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
        }
        .level-item:first-child {
            align-items: flex-start;
            padding-left: 17px;
            border-right: 1px solid var(--edge);
        }
        .level-item:last-child {
            align-items: flex-end;
            padding-right: 17px;
            border-left: 1px solid var(--edge);
        }
        .level-item:hover {
            background: rgba(255,255,255,0.02);
        }
        .level-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.41rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }
        .level-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: var(--text-primary);
        }
        .draw-value {
            color: var(--teal);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--edge);
            cursor: pointer;
            user-select: none;
        }
        .stats-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 9px 4px;
            border-right: 1px solid var(--edge);
            text-align: center;
            transition: background 0.15s;
        }
        .stats-item:last-child {
            border-right: none;
        }
        .stats-item:hover {
            background: rgba(255,255,255,0.015);
        }
        .stats-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.37rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .stats-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .winrate-value {
            color: var(--gold);
        }
        .be-value {
            color: var(--gold);
        }
        footer {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.36rem;
            color: var(--text-dim);
            text-align: center;
            padding: 14px 0 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-top: 1px solid var(--edge);
            margin-top: 4px;
            line-height: 1.9;
        }
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--surface2);
            border: 1px solid var(--edge-bright);
            color: var(--text-primary);
            padding: 8px 18px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            border-radius: 3px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.22s ease, transform 0.22s ease;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            box-shadow: var(--shadow-deep);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── PDE PANEL (DISEDERHANAKAN) ─── */
        .pde-panel {
            padding: 0;
            border-top: 1px solid var(--edge);
        }
        .pde-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 17px 7px;
            background: rgba(240,165,0,0.04);
            border-bottom: 1px solid var(--edge);
        }
        .pde-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.38rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .pde-signal-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 2px 10px;
            border-radius: 2px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .pde-signal-badge.buy {
            color: var(--emerald);
            border-color: rgba(0,217,139,0.3);
            background: rgba(0,217,139,0.07);
            box-shadow: var(--emerald-glow);
        }
        .pde-signal-badge.sell {
            color: var(--crimson);
            border-color: rgba(255,87,115,0.3);
            background: rgba(255,87,115,0.07);
            box-shadow: var(--crimson-glow);
        }
        .pde-signal-badge.neutral {
            color: var(--text-dim);
            border-color: var(--edge);
            background: transparent;
        }
        .pde-confidence-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 17px 5px;
            border-bottom: 1px solid var(--edge);
        }
        .pde-conf-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.37rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            flex-shrink: 0;
            min-width: 55px;
        }
        .pde-conf-bar-wrap {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .pde-conf-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease, background 0.3s ease;
        }
        .pde-conf-txt {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.58rem;
            font-weight: 700;
            min-width: 26px;
            text-align: right;
            flex-shrink: 0;
        }
        .pde-conf-grade {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.37rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            min-width: 58px;
            text-align: right;
        }
        .pde-pattern-row {
            padding: 5px 17px;
            border-bottom: 1px solid var(--edge);
        }
        .pde-pattern-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.43rem;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pde-meters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid var(--edge);
        }
        .pde-meter-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 7px 10px;
            border-right: 1px solid var(--edge);
        }
        .pde-meter-item:last-child {
            border-right: none;
        }
        .pde-meter-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.35rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .pde-meter-bar-wrap {
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }
        .pde-meter-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        .pde-meter-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.44rem;
            font-weight: 700;
        }
        .pde-score-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            border-bottom: 1px solid var(--edge);
        }
        .pde-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 2px;
            border-right: 1px solid var(--edge);
            cursor: default;
        }
        .pde-score-item:last-child {
            border-right: none;
        }
        .pde-score-key {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.32rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .pde-score-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.52rem;
            font-weight: 700;
        }
        .pde-reasoning {
            padding: 6px 17px 8px;
        }
        .pde-reasoning-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.34rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .pde-reason-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 56px;
            overflow: hidden;
        }
        .pde-reason-item {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.40rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .pde-reason-item::before {
            content: '▸';
            color: var(--gold);
            font-size: 0.38rem;
            flex-shrink: 0;
        }
        .pde-risk-row {
            display: flex;
            align-items: center;

    <div id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ================================================================
            //  URADVISOR v0.1 — STRUCTURE ENGINE
            //  PURE PRICE ACTION · NO LAGGING INDICATORS
            //  LOGIC: REAL MARKET LIQUIDITY + CHoCH + FVG + STRUCTURE
            // ================================================================

            const LS_SCHEMA_VERSION = 1;
            const CONFIRMATION_WAIT_MS = 2000;
            
            const COOLDOWN_AFTER_SL_MS = 180000;
            const COOLDOWN_AFTER_TP_MS = 180000;
          
            const PRICE_OFFSET_BTC = -56;
            const MACRO_DUR = { btc: 60000 };
            const MICRO_DUR = { btc: 15000 };
            const MACRO_MIN = 35;
            const MICRO_MIN = 10;

            // ── Threshold ──
            const STRUCT_STRONG_THRESHOLD = 0.15; // 15% dari rentang harga
            const LIQ_PROXIMITY_ATR_MULT = 1.2;
            const FVG_GAP_THRESHOLD = 0.0008; // 0.08% gap minimal

            // ── Schema migration ──
            function checkAndMigrateSchema() {
                const v = parseInt(localStorage.getItem('ura_schema_ver') || '0', 10);
                if (v < LS_SCHEMA_VERSION) {
                    ['btc'].forEach(id => {
                        localStorage.removeItem(`ura_state_${id}`);
                        localStorage.removeItem(`ura_stats_${id}`);
                    });
                    localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
                }
            }

            // ── Toast ──
            let _tt = null;

            function showToast(msg) {
                const el = document.getElementById('toast');
                if (!el) return;
                el.textContent = msg;
                el.classList.add('show');
                if (_tt) clearTimeout(_tt);
                _tt = setTimeout(() => el.classList.remove('show'), 2600);
            }

            // ================================================================
            //  ENGINE CORE — PURE PRICE ACTION
            // ================================================================

            // ── 1. DETECT SWING POINTS ──────────────────────────────────────
            function findSwings(candles, lookback) {
                if (!candles || candles.length < 10) return { highs: [], lows: [] };
                const slice = candles.slice(-lookback);
                const highs = [],
                    lows = [];
                for (let i = 2; i < slice.length - 2; i++) {
                    const c = slice[i];
                    if (c.high > slice[i - 1].high && c.high > slice[i - 2].high &&
                        c.high > slice[i + 1].high && c.high > slice[i + 2].high) {
                        highs.push({ idx: i, price: c.high, time: Date.now() - (slice.length - i) * 60000 });
                    }
                    if (c.low < slice[i - 1].low && c.low < slice[i - 2].low &&
                        c.low < slice[i + 1].low && c.low < slice[i + 2].low) {
                        lows.push({ idx: i, price: c.low, time: Date.now() - (slice.length - i) * 60000 });
                    }
                }
                return { highs, lows };
            }

            // ── 2. DETECT MARKET STRUCTURE ──────────────────────────────────
            function detectStructure(candles, price) {
                const sw = findSwings(candles, 60);
                const hh = sw.highs;
                const ll = sw.lows;
                if (hh.length < 2 || ll.length < 2) return { trend: 'NEUTRAL', score: 0, detail: 'INSUFFICIENT_DATA' };

                const lastH = hh[hh.length - 1];
                const prevH = hh[hh.length - 2];
                const lastL = ll[ll.length - 1];
                const prevL = ll[ll.length - 2];

                const higherHigh = lastH.price > prevH.price;
                const higherLow = lastL.price > prevL.price;
                const lowerHigh = lastH.price < prevH.price;
                const lowerLow = lastL.price < prevL.price;

                let trend = 'NEUTRAL',
                    score = 0,
                    detail = 'SIDEWAYS';

                if (higherHigh && higherLow) { trend = 'BULL';
                    score = 25;
                    detail = 'HH+HL'; } else if (higherHigh && !higherLow) { trend = 'BULL_WEAK';
                    score = 12;
                    detail = 'HH+LL'; } else if (lowerHigh && lowerLow) { trend = 'BEAR';
                    score = -25;
                    detail = 'LH+LL'; } else if (!lowerHigh && lowerLow) { trend = 'BEAR_WEAK';
                    score = -12;
                    detail = 'LH+HL'; }

                // Break of structure (BOS)
                const bosBull = price > lastH.price;
                const bosBear = price < lastL.price;
                if (bosBull && trend !== 'BEAR') { trend = 'BULL_BOS';
                    score = 30;
                    detail = 'BOS_BULL'; }
                if (bosBear && trend !== 'BULL') { trend = 'BEAR_BOS';
                    score = -30;
                    detail = 'BOS_BEAR'; }

                return { trend, score, detail, lastHigh: lastH.price, lastLow: lastL.price, swings: sw };
            }

            // ── 3. DETECT CHoCH (Change of Character) ──────────────────────
            function detectCHoCH(candles, price) {
                const sw = findSwings(candles, 50);
                const hh = sw.highs,
                    ll = sw.lows;
                if (hh.length < 3 || ll.length < 3) return { choch: false, type: 'NONE', score: 0 };

                const lastH = hh[hh.length - 1];
                const prevH = hh[hh.length - 2];
                const lastL = ll[ll.length - 1];
                const prevL = ll[ll.length - 2];

                // Bullish CHoCH: price breaks above last lower high after a downtrend
                const bullChoch = (prevH.price > lastH.price) && (price > lastH.price);
                // Bearish CHoCH: price breaks below last higher low after an uptrend
                const bearChoch = (prevL.price < lastL.price) && (price < lastL.price);

                if (bullChoch) return { choch: true, type: 'BULLISH', score: 20 };
                if (bearChoch) return { choch: true, type: 'BEARISH', score: -20 };
                return { choch: false, type: 'NONE', score: 0 };
            }

            // ── 4. DETECT FVG (Fair Value Gap) ──────────────────────────────
            function detectFVG(candles) {
                if (!candles || candles.length < 3) return { fvg: false, type: 'NONE', level: 0, gap: 0 };
                const last3 = candles.slice(-3);
                const c1 = last3[0],
                    c2 = last3[1],
                    c3 = last3[2];
                const range1 = c1.high - c1.low;
                const range3 = c3.high - c3.low;
                if (range1 === 0 || range3 === 0) return { fvg: false, type: 'NONE', level: 0, gap: 0 };

                // Bullish FVG: gap between c1 high and c3 low
                if (c3.low > c1.high) {
                    const gap = c3.low - c1.high;
                    const gapPct = gap / ((c1.high + c3.low) / 2);
                    if (gapPct > FVG_GAP_THRESHOLD) {
                        return { fvg: true, type: 'BULLISH', level: (c1.high + c3.low) / 2, gap };
                    }
                }
                // Bearish FVG: gap between c1 low and c3 high
                if (c3.high < c1.low) {
                    const gap = c1.low - c3.high;
                    const gapPct = gap / ((c1.low + c3.high) / 2);
                    if (gapPct > FVG_GAP_THRESHOLD) {
                        return { fvg: true, type: 'BEARISH', level: (c1.low + c3.high) / 2, gap };
                    }
                }
                return { fvg: false, type: 'NONE', level: 0, gap: 0 };
            }

            // ── 5. DETECT LIQUIDITY POOLS ──────────────────────────────────
            function detectLiquidity(candles, price) {
                const sw = findSwings(candles, 50);
                const hh = sw.highs,
                    ll = sw.lows;
                if (hh.length < 2 || ll.length < 2) return { above: false, below: false, level: 0, score: 0 };

                const recentHigh = hh[hh.length - 1];
                const recentLow = ll[ll.length - 1];
                const priceRange = recentHigh.price - recentLow.price;
                if (priceRange <= 0) return { above: false, below: false, level: 0, score: 0 };

                const prox = priceRange * 0.15; // 15% dari rentang

                const above = (price > recentHigh.price - prox);
                const below = (price < recentLow.price + prox);

                let score = 0;
                let level = 0;
                if (above) { score = 15;
                    level = recentHigh.price; }
                if (below) { score = -15;
                    level = recentLow.price; }

                return { above, below, level, score };
            }

            // ── 6. PRICE ACTION FILTER ──────────────────────────────────────
            function priceActionFilter(candles) {
                if (!candles || candles.length < 2) return { direction: 'NEUTRAL', score: 0 };
                const last = candles.slice(-2);
                const c1 = last[0],
                    c2 = last[1];
                const body1 = Math.abs(c1.close - c1.open);
                const body2 = Math.abs(c2.close - c2.open);
                const range2 = c2.high - c2.low;
                if (range2 === 0) return { direction: 'NEUTRAL', score: 0 };

                // Engulfing
                if (c2.close > c1.high && c2.open < c1.low) return { direction: 'BULL', score: 15 };
                if (c2.close < c1.low && c2.open > c1.high) return { direction: 'BEAR', score: 15 };

                // Pin bar
                const lowerWick = Math.min(c2.open, c2.close) - c2.low;
                const upperWick = c2.high - Math.max(c2.open, c2.close);
                if (body2 > range2 * 0.05 && lowerWick > body2 * 2.5) return { direction: 'BULL', score: 12 };
                if (body2 > range2 * 0.05 && upperWick > body2 * 2.5) return { direction: 'BEAR', score: 12 };

                return { direction: 'NEUTRAL', score: 0 };
            }

            // ── 7. SCORE ENGINE ──────────────────────────────────────────────
            function scoreEngine(price, candles) {
                if (!candles || candles.length < MACRO_MIN) {
                    return { signal: 'NEUTRAL', confidence: 0, reason: [], trend: 'NEUTRAL', struct: 'NEUTRAL',
                        choch: false, fvg: false, liq: false, pa: false };
                }

                const struct = detectStructure(candles, price);
                const choch = detectCHoCH(candles, price);
                const fvg = detectFVG(candles);
                const liq = detectLiquidity(candles, price);
                const pa = priceActionFilter(candles);

                let score = 0;
                const reasons = [];

                // ── Structure ──
                if (struct.trend === 'BULL_BOS' || struct.trend === 'BULL') { score += struct.score;
                    reasons.push('STRUCT: ' + struct.detail); } else if (struct.trend === 'BEAR_BOS' || struct.trend ===
                    'BEAR') { score += struct.score;
                    reasons.push('STRUCT: ' + struct.detail); } else if (struct.trend === 'BULL_WEAK') { score += 8;
                    reasons.push('STRUCT: WEAK BULL'); } else if (struct.trend === 'BEAR_WEAK') { score += -8;
                    reasons.push('STRUCT: WEAK BEAR'); } else { reasons.push('STRUCT: SIDEWAYS'); }

                // ── CHoCH ──
                if (choch.choch) {
                    score += choch.score;
                    reasons.push('CHoCH: ' + choch.type);
                } else {
                    reasons.push('CHoCH: NONE');
                }

                // ── FVG ──
                if (fvg.fvg) {
                    score += (fvg.type === 'BULLISH' ? 12 : -12);
                    reasons.push('FVG: ' + fvg.type + ' (' + (fvg.gap / price * 100).toFixed(2) + '%)');
                } else {
                    reasons.push('FVG: NONE');
                }

                // ── Liquidity ──
                if (liq.above) { score += liq.score;
                    reasons.push('LIQ: ABOVE @ ' + liq.level.toFixed(2)); } else if (liq.below) { score += liq.score;
                    reasons.push('LIQ: BELOW @ ' + liq.level.toFixed(2)); } else { reasons.push('LIQ: NEUTRAL'); }

                // ── Price Action ──
                if (pa.direction !== 'NEUTRAL') {
                    score += pa.score;
                    reasons.push('PA: ' + pa.direction);
                }

                // ── Determine Signal ──
                let signal = 'NEUTRAL',
                    confidence = 0;
                const absScore = Math.abs(score);
                if (score > 16) { signal = 'BUY';
                    confidence = Math.min(95, 50 + absScore * 0.6); } else if (score < -16) { signal = 'SELL';
                    confidence = Math.min(95, 50 + absScore * 0.6); } else if (score > 5) { signal = 'BUY';
                    confidence = 35 + absScore * 0.8; } else if (score < -5) { signal = 'SELL';
                    confidence = 35 + absScore * 0.8; } else { confidence = 20 + absScore * 2; }

                confidence = Math.min(98, Math.max(0, confidence));

                // Filter false signals: jika struktur dan CHoCH bertentangan
                const structDir = struct.trend.startsWith('BULL') ? 1 : (struct.trend.startsWith('BEAR') ? -1 : 0);
                const chochDir = choch.type === 'BULLISH' ? 1 : (choch.type === 'BEARISH' ? -1 : 0);
                if (structDir !== 0 && chochDir !== 0 && structDir !== chochDir) {
                    confidence = Math.max(0, confidence - 25);
                    reasons.push('CONFLICT: STRUCT vs CHoCH');
                }

                // Jika tidak ada konfirmasi price action, turunkan confidence
                if (pa.direction === 'NEUTRAL' && signal !== 'NEUTRAL') {
                    confidence = Math.max(0, confidence - 15);
                }

                // ── Risk label ──
                let risk = 'MEDIUM';
                if (confidence > 75) risk = 'LOW';
                else if (confidence < 40) risk = 'HIGH';

                return {
                    signal,
                    confidence: Math.round(confidence),
                    reasons: reasons.slice(0, 6),
                    trend: struct.trend,
                    struct: struct.detail,
                    choch: choch.choch,
                    fvg: fvg.fvg,
                    liq: liq.above || liq.below,
                    pa: pa.direction !== 'NEUTRAL',
                    risk,
                    score
                };
            }

            // ── 8. DYNAMIC RR ─────────────────────────────────────────────────
            function calcDynamicRR(price, atr) {
                const volPct = (atr / price) * 100;
                if (volPct > 2.5) return 1.2;
                if (volPct > 1.6) return 1.4;
                if (volPct > 1.0) return 1.5;
                return 1.6;
            }

            // ── 9. ATR SEDERHANA (HANYA UNTUK RR DAN SL, BUKAN LAGGING) ──
            function simpleATR(candles, period) {
                period = period || 14;
                if (!candles || candles.length < period + 1) return null;
                let sum = 0;
                for (let i = 1; i < candles.length; i++) {
                    const c = candles[i],
                        p = candles[i - 1];
                    const tr = Math.max(c.high - c.low, Math.abs(c.high - p.close), Math.abs(c.low - p.close));
                    sum += tr;
                }
                return sum / (candles.length - 1);
            }

            // ================================================================
            //  STATE & PERFORMANCE (SAMA SEPERTI SEBELUMNYA)
            // ================================================================

            function createFreshState() {
                return {
                    v: LS_SCHEMA_VERSION,
                    lastPrice: 0,
                    l1: false,
                    l2: false,
                    l3: false,
                    confirmed: false,
                    confirmedAt: 0,
                    resetInProgress: false,
                    warmupUntil: 0,
                    cooldownUntil: 0,
                    type: 'none',
                    entry: 0,
                    sl: 0,
                    tp: 0,
                    rr_used: 1.4,
                    tempHigh: 0,
                    tempLow: 0,
                    originPrice: 0,
                    confluenceScore: 0,
                    entryZone: 'NONE',
                    breakevenArmed: false
                };
            }

            function loadState(id) {
                try {
                    const r = localStorage.getItem(`ura_state_${id}`);
                    return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState();
                } catch (e) { return createFreshState(); }
            }

            function createDefaultStats() {
                return { tpHits: 0, tp1Hits: 0, slHits: 0, total: 0, winrate: 0.0 };
            }

            function loadPerformanceStats(id) {
                try {
                    const r = localStorage.getItem(`ura_stats_${id}`);
                    if (r) {
                        const parsed = JSON.parse(r);
                        if (parsed.breakevenHits !== undefined && parsed.tp1Hits === undefined) {
                            parsed.tp1Hits = parsed.breakevenHits;
                            delete parsed.breakevenHits;
                        }
                        if (parsed.tp1Hits === undefined) parsed.tp1Hits = 0;
                        return Object.assign(createDefaultStats(), parsed);
                    }
                    return createDefaultStats();
                } catch (e) { return createDefaultStats(); }
            }

            function savePerformanceStats(id) {
                try { localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); } catch (e) {}
            }

            function updateWinrate(id) {
                const s = performanceStats[id];
                s.total = s.tpHits + s.tp1Hits + s.slHits;
                const wins = s.tpHits + s.tp1Hits;
                s.winrate = s.total > 0 ? parseFloat(((wins / s.total) * 100).toFixed(1)) : 0.0;
            }

            function recordSignalResult(id, type) {
                const s = performanceStats[id];
                if (type === 'tp') s.tpHits++;
                else if (type === 'be') s.tp1Hits++;
                else if (type === 'sl') s.slHits++;
                updateWinrate(id);
                savePerformanceStats(id);
                updatePerformanceUI(id);
            }

            // ── Global ──
            let state = { btc: null };
            let wsStatus = { btc: false };
            let performanceStats = {};
            let pendingConfirmation = { btc: null };
            let tapCounters = { btc: 0 };
            let tapTimers = { btc: null };
            let historyTapCounters = { btc: 0 };
            let historyTapTimers = { btc: null };
            const TAP_TIMEOUT = 500;
            let pendingPriceData = { btc: null };
            let pendingSignalData = { btc: false };
            let rafPending = { btc: false };
            let pendingSaveData = { btc: null };
            let pendingSaveTimer = { btc: null };
            const SAVE_INTERVAL = 1200;
            let signalDebounceTimer = { btc: null };
            const SIGNAL_DEBOUNCE_MS = 15;

            let marketData = {
                btc: {
                    macro: { candles: [], current: null, start: 0 },
                    micro: { candles: [], current: null, start: 0 },
                    atr: 0,
                    price: 0
                }
            };
            let engineCache = { btc: null };
            let rawBtcPrice = null;
            let btcFetching = false;

            // ── Candle Build ──
            function buildTFCandle(tf, dur, maxCandles, price, vol) {
                const now = Date.now();
                if (!tf.current || (now - tf.start) >= dur) {
                    if (tf.current) { tf.current.closed = true;
                        tf.candles.push({ ...tf.current });
                        if (tf.candles.length > maxCandles) tf.candles.shift(); }
                    tf.current = { open: price, high: price, low: price, close: price, volume: vol || 1, closed: false };
                    tf.start = now;
                    return true;
                } else {
                    tf.current.high = Math.max(tf.current.high, price);
                    tf.current.low = Math.min(tf.current.low, price);
                    tf.current.close = price;
                    tf.current.volume += (vol || 1);
                    return false;
                }
            }

            function buildCandles(id, price, vol) {
                const md = marketData[id];
                buildTFCandle(md.macro, MACRO_DUR[id], 220, price, vol);
                buildTFCandle(md.micro, MICRO_DUR[id], 80, price, vol);
                md.price = price;
                const mc = md.macro.candles.filter(c => c.closed);
                if (mc.length >= 15) {
                    md.atr = simpleATR(mc, 14) || md.atr || 200;
                }
            }

            function getMacroCandles(id) { return marketData[id].macro.candles.filter(c => c.closed); }

            function getMicroCandles(id) { return marketData[id].micro.candles.filter(c => c.closed); }

            // ── Historical Init ──
            async function initHistoricalCandles(id) {
                const symbol = 'BTCUSDT',
                    limit = 250;
                const sources = [
                    `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1m&limit=${limit}`,
                    `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${limit}`
                ];
                for (const url of sources) {
                    try {
                        const ctrl = new AbortController();
                        const tid = setTimeout(() => ctrl.abort(), 8000);
                        const resp = await fetch(url, { signal: ctrl.signal });
                        clearTimeout(tid);
                        if (!resp.ok) continue;
                        const raw = await resp.json();
                        if (!Array.isArray(raw) || raw.length < 40) continue;
                        const closed = raw.slice(0, -1);
                        const candles = closed.map(k => ({
                            open: parseFloat(k[1]),
                            high: parseFloat(k[2]),
                            low: parseFloat(k[3]),
                            close: parseFloat(k[4]),
                            volume: parseFloat(k[5]),
                            closed: true
                        }));
                        marketData[id].macro.candles = candles;
                        const lastClose = candles[candles.length - 1].close;
                        seedMicroCandles(id, lastClose);
                        const mc = getMacroCandles(id);
                        if (mc.length >= 15) marketData[id].atr = simpleATR(mc, 14) || 200;
                        return true;
                    } catch (e) {}
                }
                seedCandles(id, 64000);
                return false;
            }

            function seedMicroCandles(id, base) {
                const step = 120,
                    nMicro = 20;
                marketData[id].micro.candles = [];
                let price = base;
                for (let i = 0; i < nMicro; i++) {
                    const open = price + (Math.random() - 0.5) * step * 0.04;
                    const close = open + (Math.random() - 0.48) * step * 0.06;
                    const hi = Math.max(open, close) + Math.random() * step * 0.03;
                    const lo = Math.min(open, close) - Math.random() * step * 0.03;
                    marketData[id].micro.candles.push({ open, high: hi, low: lo, close, volume: 20 + Math.floor(Math
                            .random() * 50), closed: true });
                    price = close;
                }
            }

            function seedCandles(id, base) {
                const step = 120,
                    nMacro = 55;
                marketData[id].macro.candles = [];
                let price = base;
                for (let i = 0; i < nMacro; i++) {
                    const drift = (Math.random() - 0.48) * step * 0.05;
                    price += drift;
                    const open = price;
                    const close = open + (Math.random() - 0.48) * step * 0.28;
                    const hi = Math.max(open, close) + Math.random() * step * 0.12;
                    const lo = Math.min(open, close) - Math.random() * step * 0.12;
                    marketData[id].macro.candles.push({ open, high: hi, low: lo, close, volume: 60 + Math.floor(Math
                            .random() * 120), closed: true });
                    price = close;
                }
                seedMicroCandles(id, price);
                const mc = getMacroCandles(id);
                if (mc.length >= 15) marketData[id].atr = simpleATR(mc, 14) || 200;
            }

t.innerText = dist > 0 ? '+' + formatted : formatted;

            // ── PDE UI ──
            function updatePatternEngineUI(id, engineResult) {
                if (!engineResult) return;

                const sigEl = document.getElementById(`pde-signal-${id}`);
                if (sigEl) {
                    sigEl.textContent = engineResult.signal === 'BUY' ? '↑ BUY' : engineResult.signal === 'SELL' ? '↓ SELL' :

                    sigEl.className = 'pde-signal-badge ' + (engineResult.signal === 'BUY' ? 'buy' : engineResult.signal ===
                        'SELL' ? 'sell' : 'neutral');
                }

                const cfFill = document.getElementById(`pde-cf-fill-${id}`);
                const cfTxt = document.getElementById(`pde-cf-txt-${id}`);
                const cfGrade = document.getElementById(`pde-cf-grade-${id}`);
                const conf = engineResult.confidence || 0;
                if (cfFill) {
                    cfFill.style.width = conf + '%';
                    cfFill.style.background = engineResult.signal === 'BUY' ? 'var(--emerald)' : engineResult.signal ===
                        'SELL' ? 'var(--crimson)' : 'var(--text-dim)';
                }
                if (cfTxt) { cfTxt.textContent = conf + '%';
                    cfTxt.style.color = conf > 70 ? 'var(--emerald)' : conf > 40 ? 'var(--gold)' : 'var(--crimson)'; }
                if (cfGrade) {
                    const grade = conf > 75 ? 'EXCELLENT' : conf > 55 ? 'STRONG' : conf > 35 ? 'MODERATE' : 'WEAK';
                    cfGrade.textContent = grade;
                    cfGrade.style.color = conf > 75 ? 'var(--emerald)' : conf > 55 ? 'var(--gold)' : 'var(--crimson)';
                }

                const patEl = document.getElementById(`pde-pattern-${id}`);
                if (patEl) {
                    const reasons = engineResult.reasons || [];
                    patEl.textContent = reasons.length > 0 ? reasons.slice(0, 3).join(' · ') : 'ANALYZING...';
                }

                // Meters
                const strengthPct = Math.min(100, Math.abs(engineResult.score || 0) * 1.5);
                const probPct = conf;
                const riskPct = engineResult.risk === 'LOW' ? 20 : engineResult.risk === 'MEDIUM' ? 50 : 80;

                [
                    ['str', strengthPct, engineResult.signal === 'BUY' ? 'var(--emerald)' : engineResult.signal === 'SELL' ?
                        'var(--crimson)' : 'var(--text-dim)'],
                    ['prob', probPct, conf > 70 ? 'var(--emerald)' : conf > 40 ? 'var(--gold)' : 'var(--crimson)'],
                    ['risk', riskPct, riskPct > 60 ? 'var(--crimson)' : riskPct > 35 ? 'var(--amber)' : 'var(--emerald)']
                ].forEach(([m, pct, col]) => {
                    const fill = document.getElementById(`pde-meter-${m}-fill-${id}`);
                    const val = document.getElementById(`pde-meter-${m}-val-${id}`);
                    if (fill) { fill.style.width = pct + '%';
                        fill.style.background = col; }
                    if (val) {
                        const txt = m === 'str' ? Math.round(pct) + '%' : m === 'prob' ? Math.round(pct) + '%' :
                            engineResult.risk || '—';
                        val.textContent = txt;
                        val.style.color = col;
                    }
                });

                // Score grid (6 items)
                const scoreItems = [
                    ['struct', 'STRUCT', engineResult.struct || '—'],
                    ['trend', 'TREND', engineResult.trend || '—'],
                    ['choch', 'CHoCH', engineResult.choch ? '✓' : '✗'],
                    ['fvg', 'FVG', engineResult.fvg ? '✓' : '✗'],
                    ['liq', 'LIQ', engineResult.liq ? '✓' : '✗'],
                    ['pa', 'PA', engineResult.pa ? '✓' : '✗']
                ];
                scoreItems.forEach(([key, label, value]) => {
                    const el = document.getElementById(`pde-sc-${key}-${id}`);
                    if (!el) return;
                    el.textContent = value;
                    const isGood = value === '✓' || value === 'BULL' || value === 'BULL_BOS' || value === 'BULL_WEAK';
                    const isBad = value === '✗' || value === 'BEAR' || value === 'BEAR_BOS' || value === 'BEAR_WEAK';
                    el.style.color = isGood ? 'var(--emerald)' : isBad ? 'var(--crimson)' : 'var(--text-dim)';
                });

                // Reasoning
                const reasonEl = document.getElementById(`pde-reason-list-${id}`);
                if (reasonEl) {
                    const items = (engineResult.reasons || []).slice(0, 5);
                    reasonEl.innerHTML = items.length > 0 ?
                        items.map(r => `<div class="pde-reason-item">${r}</div>`).join('') :
                        `<div class="pde-reason-item" style="color:var(--text-dim)">Scanning...</div>`;
                }

                const riskEl = document.getElementById(`pde-risk-${id}`);
                if (riskEl) {
                    const r = engineResult.risk || 'MEDIUM';
                    riskEl.textContent = r;
                    riskEl.className = `pde-risk-badge ${r.toLowerCase()}`;
                }

                const eqEl = document.getElementById(`pde-eq-${id}`);
                if (eqEl) {
                    const eq = engineResult.confidence > 75 ? 'EXCELLENT' : engineResult.confidence > 50 ? 'GOOD' : 'POOR';
                    eqEl.textContent = eq;
                    eqEl.className = `pde-quality-badge ${eq.toLowerCase()}`;
                }
            }

            function cancelPendingConfirmation(id) {

                if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]);
                    signalDebounceTimer[id] = null; }
                const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
                Object.assign(s, createFreshState(), kept);
                pendingSignalData[id] = true;
                updateSignalUIOnly(id);
                const t = document.getElementById(`tracker-${id}`);
                if (t) t.innerText = '0';
                throttledSaveState(id);

                requestAnimationFrame(() => { s.resetInProgress = false; });

            function handleSignalBarTap(id) {

                tapCounters[id]++;
                tapTimers[id] = setTimeout(() => { tapCounters[id] = 0;

                if (tapCounters[id] === 3) {
                    if (pendingConfirmation[id]) cancelPendingConfirmation(id);

                    performanceStats[id] = createDefaultStats();

                    updatePerformanceUI(id);
