// ================================================================
//  MTF CONFLUENCE (TIDAK DIUBAH)
// ================================================================
function aggregateCandles(candles, factor) {
    if (!candles || candles.length < factor) return [];
    const result = [];
    for (let i = 0; i <= candles.length - factor; i += factor) {
        const slice = candles.slice(i, i + factor);
        if (slice.length === 0) continue;
        const open = slice[0].open;
        const close = slice[slice.length - 1].close;
        const high = Math.max(...slice.map(c => c.high));
        const low = Math.min(...slice.map(c => c.low));
        const volume = slice.reduce((sum, c) => sum + (c.volume || 0), 0);
        result.push({ open, high, low, close, volume, closed: true });
    }
    return result;
}

function getMTFConfirmation(id, price, macroCandles) {
    if (!macroCandles || macroCandles.length < 15) return { score: 0, trend5m: 'NEUTRAL', trend15m: 'NEUTRAL' };
    const tf5m = aggregateCandles(macroCandles, 5);
    const tf15m = aggregateCandles(macroCandles, 15);
    const atr5 = calcATR(tf5m) || 1;
    const atr15 = calcATR(tf15m) || 1;
    const trend5m = tf5m.length >= 5 ? calcBCTrend(tf5m.map(c => c.close), atr5) : null;
    const trend15m = tf15m.length >= 3 ? calcBCTrend(tf15m.map(c => c.close), atr15) : null;
    let score = 0;
    let t5 = 'NEUTRAL', t15 = 'NEUTRAL';
    if (trend5m) {
        t5 = trend5m.trend;
        if (trend5m.score > 0) score += 10;
        else if (trend5m.score < 0) score -= 10;
        if (t5 === 'BULL_X' || t5 === 'BULL_X_BULL') score += 5;
        if (t5 === 'BEAR_X' || t5 === 'BEAR_X_BEAR') score -= 5;
    }
    if (trend15m) {
        t15 = trend15m.trend;
        if (trend15m.score > 0) score += 10;
        else if (trend15m.score < 0) score -= 10;
        if (t15 === 'BULL_X' || t15 === 'BULL_X_BULL') score += 5;
        if (t15 === 'BEAR_X' || t15 === 'BEAR_X_BEAR') score -= 5;
    }
    if (trend5m && trend15m && trend5m.score > 0 && trend15m.score > 0) score += 5;
    if (trend5m && trend15m && trend5m.score < 0 && trend15m.score < 0) score -= 5;
    // Kembalikan skor signed (positif = bullish, negatif = bearish)
    return { score, trend5m: t5, trend15m: t15 };
}

// ================================================================
//  ORDER BLOCK DETECTION (TIDAK DIUBAH)
// ================================================================
function detectOrderBlock(candles, atr) {
    if (!candles || candles.length < 20) return { type: 'NONE', top: 0, bot: 0, strength: 0 };
    const recent = candles.slice(-20);
    for (let i = 2; i < recent.length; i++) {
        const body = Math.abs(recent[i].close - recent[i].open);
        const prevBody = Math.abs(recent[i-1].close - recent[i-1].open);
        if (body > prevBody * 1.8 && body > atr * 0.3) {
            if (recent[i].close > recent[i].open) {
                return { type: 'BULL_OB', top: recent[i].high, bot: recent[i].open, strength: body/atr };
            } else {
                return { type: 'BEAR_OB', top: recent[i].open, bot: recent[i].low, strength: body/atr };
            }
        }
    }
    return { type: 'NONE', top: 0, bot: 0, strength: 0 };
}

// ================================================================
//  FVG DETECTION (TIDAK DIUBAH)
// ================================================================
function detectFVG(candles) {
    if (!candles || candles.length < 3) return { type: 'NONE', level: 0, gap: 0 };
    const last = candles.slice(-3);
    const c1 = last[0], c2 = last[1], c3 = last[2];
    if (c3.low > c1.high) {
        const gap = c3.low - c1.high;
        return { type: 'BULL_FVG', level: (c1.high + c3.low) / 2, gap };
    } else if (c3.high < c1.low) {
        const gap = c1.low - c3.high;
        return { type: 'BEAR_FVG', level: (c1.low + c3.high) / 2, gap };
    }
    return { type: 'NONE', level: 0, gap: 0 };
}

// ================================================================
//  VOLUME PROFILE (POC) (TIDAK DIUBAH)
// ================================================================
function calcVolumeProfile(candles, price, atr) {
    if (!candles || candles.length < 10) return { nearPOC: false, pocLevel: 0, score: 0 };
    const lookback = 20; const rc = candles.slice(-lookback);
    const levels = []; const step = atr * 0.1;
    for (let i = 0; i < 21; i++) {
        const level = price - atr + i * step;
        let vol = 0;
        for (const c of rc) { if (c.low <= level && c.high >= level) vol += c.volume || 1; }
        levels.push({ level, vol });
    }
    const poc = levels.reduce((a, b) => a.vol > b.vol ? a : b);
    const nearPOC = Math.abs(price - poc.level) < atr * 0.3;
    return { nearPOC, pocLevel: poc.level, score: nearPOC ? 10 : 0 };
}

// ================================================================
//  PRICE ACTION FILTER (TIDAK DIUBAH)
// ================================================================
function checkPriceAction(candles, direction, atr) {
    if (!candles || candles.length < 2) return 0;
    const last = candles.slice(-2);
    const c1 = last[0], c2 = last[1];
    let score = 0;
    const range2 = c2.high - c2.low;
    if (direction === 'buy') {
        // Bullish engulf: c2 menutup di atas high c1 dan buka di bawah low c1
        if (c2.close > c1.high && c2.open < c1.low) score = 15;
        const body = Math.abs(c2.close - c2.open);
        // Hammer / pin bar bullish: lower wick panjang; body minimal 5% dari range (hindari doji)
        const lowerWick = Math.min(c2.open, c2.close) - c2.low;
        if (body > range2 * 0.05 && lowerWick > body * 2.5) score = Math.max(score, 12);
        // Inside bar bullish: c2 close > open (candle hijau) dalam range c1
        if (c2.close > c2.open && c2.low > c1.low && c2.high < c1.high) score = Math.max(score, 8);
    } else {
        // Bearish engulf: c2 menutup di bawah low c1 dan buka di atas high c1
        if (c2.close < c1.low && c2.open > c1.high) score = 15;
        const body = Math.abs(c2.close - c2.open);
        // Shooting star / pin bar bearish: upper wick panjang; body minimal 5% dari range (hindari doji)
        const upperWick = c2.high - Math.max(c2.open, c2.close);
        if (body > range2 * 0.05 && upperWick > body * 2.5) score = Math.max(score, 12);
        // Inside bar bearish: c2 close < open (candle merah) dalam range c1
        if (c2.close < c2.open && c2.low > c1.low && c2.high < c1.high) score = Math.max(score, 8);
    }
    return score;
}

// ================================================================
//  DYNAMIC RR — basis volatilitas persentase, cocok untuk BTC (ATR ratusan $ per 1-min bar)
//  Threshold berdasarkan ATR absolut agar benar-benar dinamis:
//    ATR > 18  → pasar sangat volatile → RR ketat 1.2
//    ATR > 10  → volatile normal-tinggi  → RR 1.4
//    ATR >  5  → volatilitas sedang      → RR 1.5
//    ATR ≤  5  → pasar tenang            → RR longgar 1.6
// ================================================================
function calculateDynamicRR(atr, price) {
    const volatilityPct = (atr / price) * 100;
    let rr;
    if (volatilityPct > 2.5) rr = 1.2;
    else if (volatilityPct > 1.6) rr = 1.4;
    else if (volatilityPct > 1.0) rr = 1.5;
    else rr = 1.6;
    return rr;
}

// ================================================================
//  BC MACRO BIAS SCORER
// ================================================================
function scoreMacroBias(id, price, macroCandles) {
    const f = {};
    if (macroCandles.length < MACRO_MIN) return { bias: 'NEUTRAL', score: 0, factors: f, valid: false };
    const closes = macroCandles.map(c => c.close);
    const atr    = calcATR(macroCandles) || (ATR_FALLBACK[id] || 300);
    const adx    = calcADX(macroCandles, 14);
    const macd   = calcMACD(closes);
    f.atr = atr; f.adx = adx ? adx.toFixed(1) : null;
    f.adx_class = adx ? (adx >= 35 ? 'STRONG' : adx >= 25 ? 'TREND' : adx >= 20 ? 'MILD' : 'CHOPPY') : 'UNKNOWN';
    if (adx !== null && adx < ADX_MIN) { return { bias: 'NEUTRAL', score: 0, factors: f, valid: false, adx, atr }; }
    const adxMult = adx !== null ? (adx >= 35 ? 1.18 : adx >= 25 ? 1.08 : adx >= 16 ? 0.93 : 0.75) : 0.85;
    const bcTrend = calcBCTrend(closes, atr);
    f.bc_trend  = bcTrend ? bcTrend.trend : null;
    f.bc_trend_score = bcTrend ? bcTrend.score : 0;
    f.just_crossed = bcTrend
        ? (bcTrend.trend === 'BULL_X' || bcTrend.trend === 'BULL_X_BULL'
           || bcTrend.trend === 'BEAR_X' || bcTrend.trend === 'BEAR_X_BEAR')
        : false;
    f.ema21 = bcTrend.ema21; f.ema50 = bcTrend.ema50;
    const bcStruct = calcBCStruct(macroCandles); f.bc_struct = bcStruct.struct; f.bc_bos = bcStruct.bos;
    const bcZone = calcBCZone(id, macroCandles, price, atr); f.bc_zone = bcZone.zone;
    const bcFlow = calcBCFlow(macroCandles, 12); f.bc_flow = bcFlow.flow;
    let macdScore = 0, macdSig = 'FLAT';
    if (macd !== null) {
        f.macd_hist = macd.hist.toFixed(5);
        if (macd.hist > 0 && macd.line > 0) { macdScore = 15; macdSig = 'BULL'; }
        else if (macd.hist > 0) { macdScore = 10; macdSig = 'BULL_X'; }
        else if (macd.hist < 0 && macd.line < 0) { macdScore = -15; macdSig = 'BEAR'; }
        else if (macd.hist < 0) { macdScore = -10; macdSig = 'BEAR_X'; }
        f.macd_sig = macdSig;
    }
    const rawBull = Math.max(0, bcTrend.score) + Math.max(0, bcStruct.score) + Math.max(0, bcZone.score) + Math.max(0, bcFlow.score) + Math.max(0, macdScore);
    const rawBear = Math.max(0, -bcTrend.score) + Math.max(0, -bcStruct.score) + Math.max(0, -bcZone.score) + Math.max(0, -bcFlow.score) + Math.max(0, -macdScore);
    let bull = Math.round(rawBull * adxMult); let bear = Math.round(rawBear * adxMult);
    const trendBull = bcTrend.score > 0; const trendBear = bcTrend.score < 0;
    const structBull = bcStruct.score > 0; const structBear = bcStruct.score < 0;
    // Deteksi konflik TREND vs STRUCT: jika keduanya signifikan, blokir sinyal
    const trendSignificant  = Math.abs(bcTrend.score) >= 16;
    const structSignificant = Math.abs(bcStruct.score) >= 15;
    if ((trendBull && structBear) || (trendBear && structBull)) {
        f.conflict = 'TREND_STRUCT';
        if (trendSignificant && structSignificant) {
            // Konflik kuat — blokir sinyal sama sekali
            return { bias: 'NEUTRAL', score: 0, factors: f, valid: false, adx, atr, ema21: bcTrend.ema21, bcZone };
        }
        // Konflik ringan — kurangi skor saja
        bull = Math.round(bull * 0.65); bear = Math.round(bear * 0.65);
    }
    const MAX = 72; const diff = Math.abs(bull - bear);
    let bias = 'NEUTRAL', score = 0;
    const rawScore = Math.min(100, Math.round((Math.max(bull, bear) / MAX) * 100));

if (bull > bear && diff >= 10) {
    bias = 'BEAR';   // dibalik
    score = rawScore; // gunakan kekuatan asli agar valid tetap terpenuhi
} else if (bear > bull && diff >= 10) {
    bias = 'BULL';   // dibalik
    score = rawScore;
} else {
    score = Math.round(Math.max(bull, bear) * 0.55);
}
    const valid = score >= BC_SCORE_MIN && bias !== 'NEUTRAL';
    // Compute bull/bear percentage for PDE display
    const bullPct = Math.min(100, Math.round((bull / MAX) * 100));
    const bearPct = Math.min(100, Math.round((bear / MAX) * 100));
    return { bias, score, bullPct, bearPct, factors: f, valid, adx, atr, ema21: bcTrend.ema21, bcZone };
}

// ================================================================
//  BC MICRO ENTRY SCORER (TIDAK DIUBAH)
// ================================================================
function scoreMicroEntry(id, price, microCandles, macroBias) {
    const f = {};
    if (microCandles.length < MICRO_MIN) return { ready: false, direction: null, quality: 0, factors: f, zoneType: null };
    if (!macroBias || !macroBias.valid)  return { ready: false, direction: null, quality: 0, factors: f, zoneType: null };

    const closes    = microCandles.map(c => c.close);
    const microATR  = calcATR(microCandles, Math.min(10, microCandles.length - 1)) || macroBias.atr * 0.3;
    const rsi9      = calcRSI(closes, Math.min(9, closes.length - 1));
    const microMACD = calcMACD(closes, 5, 13, 4);

    const MICRO_CROSS_MIN = 23;
    const ema9m    = closes.length > MICRO_CROSS_MIN ? calcEMA(closes, 9)  : null;
    const ema21m   = closes.length > MICRO_CROSS_MIN ? calcEMA(closes, 21) : null;
    const ema9m_1  = closes.length > MICRO_CROSS_MIN + 1
        ? calcEMA(closes.slice(0, -1), 9)  : null;
    const ema21m_1 = closes.length > MICRO_CROSS_MIN + 1
        ? calcEMA(closes.slice(0, -1), 21) : null;
    const MICRO_CROSS_LB = Math.min(3, closes.length - MICRO_CROSS_MIN - 1);
    const ema9m_lb  = (MICRO_CROSS_LB > 0 && closes.length > MICRO_CROSS_MIN + MICRO_CROSS_LB)
        ? calcEMA(closes.slice(0, -MICRO_CROSS_LB), 9)  : null;
    const ema21m_lb = (MICRO_CROSS_LB > 0 && closes.length > MICRO_CROSS_MIN + MICRO_CROSS_LB)
        ? calcEMA(closes.slice(0, -MICRO_CROSS_LB), 21) : null;
    const microGoldenX = (ema9m !== null && ema21m !== null && ema9m_lb !== null && ema21m_lb !== null)
                         ? (ema9m_lb < ema21m_lb && ema9m >= ema21m) : false;
    const microDeathX  = (ema9m !== null && ema21m !== null && ema9m_lb !== null && ema21m_lb !== null)
                         ? (ema9m_lb > ema21m_lb && ema9m <= ema21m) : false;

    f.rsi = rsi9 ? rsi9.toFixed(1) : null;
    const { bias, ema21: macroEMA21, atr: macroATR, bcZone } = macroBias;
    const direction = bias === 'BULL' ? 'buy' : 'sell';

    // ── 1. BC LIQUID (40 pts) ─────────────────────────────────────
    const bcLiquid  = calcBCLiquid(microCandles, microATR);
    f.bc_liquid     = bcLiquid.sweep;
    const liquidScore = bcLiquid.sweep === 'BULL_SWEEP' && direction === 'buy'  ? 40 :
                        bcLiquid.sweep === 'BEAR_SWEEP' && direction === 'sell' ? 40 : 0;

    // ── 2. BC MOM (25 pts) ────────────────────────────────────────
    let momScore = 0, rsiSig = 'NEUTRAL';
    if (rsi9 !== null) {
        if (direction === 'buy') {
            if (rsi9 < 32) { momScore = 25; rsiSig = 'OVERSOLD'; }
            else if (rsi9 < 45) { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 < 55) { momScore = 8; rsiSig = 'MILD'; }
        } else {
            if (rsi9 > 68) { momScore = 25; rsiSig = 'OVERBOUGHT'; }
            else if (rsi9 > 55) { momScore = 18; rsiSig = 'PULLBACK'; }
            else if (rsi9 > 45) { momScore = 8; rsiSig = 'MILD'; }
        }
    }
    f.rsi_sig = rsiSig;

    // ── 3. BC DIVERG (20 pts) ─────────────────────────────────────
    const bcDiv    = calcBCDiverg(microCandles, closes, rsi9);
    f.bc_diverg    = bcDiv.diverg;
    const divergScore = (bcDiv.diverg === 'BULL_DIV' && direction === 'buy')  ? 20 :
                        (bcDiv.diverg === 'BEAR_DIV' && direction === 'sell') ? 20 : 0;

    // ── 4. Zone proximity (15 pts) ───────────────────────────────
    let zoneScore = 0, zoneType = 'NONE';
    const snapDist = macroATR * 0.30;
    if (direction === 'buy') {
        const nearEMA  = macroEMA21 && price <= macroEMA21 + snapDist && price >= macroEMA21 - snapDist * 0.6;
        const inDemand = bcZone && (bcZone.zone === 'DEMAND' || bcZone.zone === 'NEAR_DEMAND');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inDemand) { zoneScore = 15; zoneType = 'DEMAND'; }
        else if (rsi9 !== null && rsi9 < 42) { zoneScore = 8; zoneType = 'RSI_PB'; }
    } else {
        const nearEMA  = macroEMA21 && price >= macroEMA21 - snapDist && price <= macroEMA21 + snapDist * 0.6;
        const inSupply = bcZone && (bcZone.zone === 'SUPPLY' || bcZone.zone === 'NEAR_SUPPLY');
        if (nearEMA) { zoneScore = 15; zoneType = 'EMA21'; }
        else if (inSupply) { zoneScore = 15; zoneType = 'SUPPLY'; }
        else if (rsi9 !== null && rsi9 > 58) { zoneScore = 8; zoneType = 'RSI_PB'; }
    }
    f.zone_type = zoneType;

    // ── 5. MACD micro momentum bonus (5 pts) ─────────────────────
    let microMACD_bonus = 0;
    if (microMACD) {
        if (direction === 'buy'  && microMACD.hist > 0) microMACD_bonus = 5;
        if (direction === 'sell' && microMACD.hist < 0) microMACD_bonus = 5;
    }

    // ── 5b. MICRO EMA CROSS bonus (15 pts) ───────────────────────
    let microCrossScore = 0;
    f.micro_cross = 'NONE';
    if (direction === 'buy'  && microGoldenX) { 
        microCrossScore = 15; 
        f.micro_cross = 'GOLDEN_X'; 
    } else if (direction === 'sell' && microDeathX) { 
        microCrossScore = 15; 
        f.micro_cross = 'DEATH_X'; 
    }

    // ── 6. MTF CONFLUENCE (max 25 pts, min -20 pts penalty) ──────
    const macroCandles = getMacroCandles(id);
    const mtf = getMTFConfirmation(id, price, macroCandles);
    f.mtf_score = mtf.score;
    f.mtf_5m = mtf.trend5m;
    f.mtf_15m = mtf.trend15m;
    // MTF bonus bersifat directional:
    //   - score positif = MTF konfirmasi BUY → bonus untuk buy, penalty untuk sell
    //   - score negatif = MTF konfirmasi SELL → bonus untuk sell, penalty untuk buy
    const mtfRaw = mtf.score; // bisa negatif sekarang
    let mtfBonus = 0;
    if (direction === 'buy') {
        mtfBonus = mtfRaw > 0 ? Math.min(mtfRaw, 25) : Math.max(mtfRaw, -20);
    } else {
        mtfBonus = mtfRaw < 0 ? Math.min(-mtfRaw, 25) : Math.max(-mtfRaw, -20);
    }

    // ── 7. ORDER BLOCK (max 25 pts) ──────────────────────────────
    const ob = detectOrderBlock(microCandles, microATR);
    f.ob_type = ob.type;
    let obScore = 0;
    if (direction === 'buy' && ob.type === 'BULL_OB' && price <= ob.top && price >= ob.bot - microATR*0.2) obScore = 25;
    else if (direction === 'sell' && ob.type === 'BEAR_OB' && price >= ob.bot && price <= ob.top + microATR*0.2) obScore = 25;
    f.ob_score = obScore;

    // ── 8. FVG (max 18 pts) ───────────────────────────────────────
    const fvg = detectFVG(microCandles);
    f.fvg_type = fvg.type;
    let fvgScore = 0;
    if (direction === 'buy' && fvg.type === 'BULL_FVG' && price <= fvg.level + microATR*0.3) fvgScore = 18;
    else if (direction === 'sell' && fvg.type === 'BEAR_FVG' && price >= fvg.level - microATR*0.3) fvgScore = 18;
    f.fvg_score = fvgScore;

    // ── 9. VOLUME PROFILE (max 10 pts) ────────────────────────────
    const vp = calcVolumeProfile(microCandles, price, microATR);
    f.vp_nearPOC = vp.nearPOC;
    const vpScore = vp.score;

    // ── 10. PRICE ACTION (max 15 pts) ─────────────────────────────
    const paScore = checkPriceAction(microCandles, direction, microATR);
    f.pa_score = paScore;

    // ── QUALITY SUM ──────────────────────────────────────────────
    let quality = liquidScore + momScore + divergScore + zoneScore + microMACD_bonus +
                  mtfBonus + obScore + fvgScore + vpScore + paScore + microCrossScore;
    // Clamp 0–100: mtfBonus bisa negatif (MTF berlawanan arah), wajar bila quality turun
    quality = Math.min(100, Math.max(0, quality));
    f.quality = quality;
    f.in_zone = zoneScore > 0 || liquidScore > 0;

    // ── READY & LOCK THRESHOLDS ──────────────────────────────────
    const hasLiquidOrZone = liquidScore > 0 || zoneScore >= 8 || obScore > 0 || fvgScore > 0;
    const ready = quality >= MICRO_READY_THRESHOLD && hasLiquidOrZone;
    const lockable = quality >= MICRO_LOCK_THRESHOLD && hasLiquidOrZone;

    return { ready, lockable, direction, quality, factors: f, zoneType };
}

// ================================================================
//  EXECUTE LOCK SIGNAL (TIDAK DIUBAH)
// ================================================================
function executeLockSignal(id, direction, livePrice, macroScore, zoneType) {
    const s     = state[id];
    const entry = livePrice > 0 ? livePrice : (s.lastPrice || 0);
    if (entry <= 0) return;
    const atr = marketData[id].atr || (ATR_FALLBACK[id] || 300);
    const microCandles = getMicroCandles(id);
    let structuralSL = 0;
    if (microCandles.length >= 5) {
        const recent = microCandles.slice(-5);
        if (direction === 'buy') { const lowestLow = Math.min(...recent.map(c => c.low)); structuralSL = lowestLow - atr * 0.12; }
        else { const highestHigh = Math.max(...recent.map(c => c.high)); structuralSL = highestHigh + atr * 0.12; }
    }
    const minSL = 250;
    let slD = Math.abs(entry - structuralSL);
    if (slD < minSL || structuralSL === 0) slD = Math.max(atr * 0.85, minSL);

    const rr = calculateDynamicRR(atr, entry);
    const tpD = slD * rr;

    s.l3 = true; s.confirmed = true;
    s.confirmedAt    = Date.now();
    s.warmupUntil    = Date.now() + 3000;
    s.type           = direction;
    s.entry          = entry;
    s.originPrice    = entry;
    s.tempHigh       = entry;
    s.tempLow        = entry;
    s.confluenceScore = macroScore;
    s.entryZone      = zoneType || 'BC_ZONE';
    s.breakevenArmed = false;
    s.rr_used        = rr;

    if (direction === 'buy') { s.sl = entry - slD; s.tp = entry + tpD; }
    else                     { s.sl = entry + slD; s.tp = entry - tpD; }

    throttledSaveState(id);
    pendingSignalData[id] = true;
    throttledUpdateUI(id);
    document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    showToast(`${id.toUpperCase()} ${direction.toUpperCase()} @ ${entry.toFixed(2)} | RR:${rr.toFixed(1)} | ${zoneType}`);
}

// ================================================================
//  ════════════════════════════════════════════════════════════════
//  ║  PROCESS SIGNAL — DIPERBAIKI TOAST TP1                    ║
//  ════════════════════════════════════════════════════════════════
// ================================================================

function processSignal(id, price) {
    const s = state[id];
    if (!s) return;
    if (Date.now() < (s.cooldownUntil || 0)) return;
    buildCandles(id, price);

    // ============================================================
    //  CONFIRMED SIGNAL — MONITOR TP / SL / BREAKEVEN
    // ============================================================
    if (s.confirmed && s.type !== 'none') {
        // Update tracker
        if (!s.tempHigh) { s.tempHigh = s.entry; s.tempLow = s.entry; }
        if (price > s.tempHigh) s.tempHigh = price;
        if (price < s.tempLow)  s.tempLow  = price;
        updateTracker(id, price);

        // ── 1. CEK TP ──────────────────────────────────────────
        const hitTP = (s.type === 'buy' && price >= s.tp) || 
                      (s.type === 'sell' && price <= s.tp);
        if (hitTP) {
            recordSignalResult(id, 'tp');
            resetSignal(id);
            return;
        }

        // ── 2. CEK SL ──────────────────────────────────────────
        const hitSL = (s.type === 'buy' && price <= s.sl) || 
                      (s.type === 'sell' && price >= s.sl);
        if (hitSL) {
            // Jika breakeven sudah armed → BREAKEVEN (TP1)
            // Jika belum armed → LOSS (SL)
            const result = s.breakevenArmed ? 'be' : 'sl';
            recordSignalResult(id, result);
            if (result === 'sl') {
                state[id].cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
            }
            resetSignal(id);
            return;
        }

        // ── 2b. SIGNAL TIMEOUT 30 MENIT (hanya sebelum breakeven armed) ──
        if (!s.breakevenArmed) {
            const elapsed = Date.now() - (s.confirmedAt || 0);
            if (elapsed >= SIGNAL_TIMEOUT_MS) {
                s.cooldownUntil = Date.now() + COOLDOWN_AFTER_SL_MS;
                resetSignal(id);
                showToast(`BTC ⏱ TIMEOUT 30m — signal dibatalkan`);
                return;
            }
        }

        // ── 3. ARM BREAKEVEN (35% dari jarak TP) ──────────────
        if (!s.breakevenArmed && Date.now() > (s.warmupUntil || 0)) {
            const tpDist = Math.abs(s.tp - s.entry);
            const moved = s.type === 'buy' ? price - s.entry : s.entry - price;
            
            // Jika harga sudah mencapai 30% dari jarak TP
            if (moved >= tpDist * 0.40) {
                // PINDAHKAN SL KE ENTRY (BREAKEVEN)
                s.sl = s.entry;
                s.breakevenArmed = true;
                throttledSaveState(id);
                // ── TOAST DIUBAH: BREAKEVEN → TP1 ─────────────
                showToast(`${id.toUpperCase()} 🔒 TP1 ARMED @ ${s.entry.toFixed(2)}`);
            }
        }

        // ── 4. RETRACE LOGIC DIHAPUS TOTAL ────────────────────
        // Tidak ada lagi kode retrace di sini

        return;
    }

    // ============================================================
    //  PENDING CONFIRMATION — skip processing
    // ============================================================
    if (pendingConfirmation[id]) { 
        s.lastPrice = price; 
        return; 
    }

    // ============================================================
    //  BUILD CANDLES & CHECK MINIMUM
    // ============================================================
    const macroCandles = getMacroCandles(id);
    const microCandles = getMicroCandles(id);
    if (macroCandles.length < MACRO_MIN) { s.lastPrice = price; return; }
    if (microCandles.length < MICRO_MIN) { s.lastPrice = price; return; }

    // ============================================================
    //  MACRO BIAS
    // ============================================================
    let macroBias = macroBiasCache[id];
    if (!macroBias) { macroBias = scoreMacroBias(id, price, macroCandles); macroBiasCache[id] = macroBias; }
    updateEngineBadges(id, macroBias);
    updateConfluenceBar(id, macroBias.score);

    // ── PATTERN DETECTION ENGINE ───────────────────────────────
    const pde = runPatternEngine(id, price, macroCandles, microCandles, macroBias);
    if (pde) updatePatternEngineUI(id, pde);

    if (!macroBias.valid) { 
        if (s.l1 || s.l2) resetSignal(id); 
        s.lastPrice = price; 
        return; 
    }

    // ============================================================
    //  MICRO ENTRY SCORE
    // ============================================================
    const micro = scoreMicroEntry(id, price, microCandles, macroBias);

    // ── L1: Bias ─────────────────────────────────────────────────
    if (!s.l1) {
        s.l1 = true; 
        s.type = macroBias.bias === 'BULL' ? 'buy' : 'sell'; 
        s.macroScore = macroBias.score; 
        s.macroBias = macroBias.bias;
        pendingSignalData[id] = true; 
        throttledUpdateUI(id); 
        throttledSaveState(id); 
        return;
    }

    // ── Check if macro bias still aligns ─────────────────────────
    const expectedDir = s.type;
    const currentDir  = macroBias.bias === 'BULL' ? 'buy' : 'sell';
    if (s.l1 && !s.confirmed && macroBias.valid && currentDir !== expectedDir) { 
        resetSignal(id); 
        return; 
    }

    // ── L2: Ready ────────────────────────────────────────────────
    if (s.l1 && !s.l2 && micro.ready) { 
        s.l2 = true; 
        pendingSignalData[id] = true; 
        throttledUpdateUI(id); 
        throttledSaveState(id); 
        return; 
    }

    // ── L3: Lock ─────────────────────────────────────────────────
    if (s.l2 && !s.l3 && micro.lockable && micro.quality >= MICRO_LOCK_THRESHOLD) {
        s.l3 = true; 
        pendingSignalData[id] = true; 
        throttledUpdateUI(id); 
        throttledSaveState(id);
        startConfirmationDelay(id, currentDir, price, macroBias.score, micro.zoneType); 
        return;
    }

    // ── Reset L2 if micro no longer ready ───────────────────────
    if (s.l2 && !s.l3 && !micro.ready && !micro.factors.in_zone) { 
        s.l2 = false; 
        pendingSignalData[id] = true; 
        throttledUpdateUI(id); 
    }

    s.lastPrice = price; 
    throttledSaveState(id);
}

// ================================================================
//  START CONFIRMATION DELAY (TIDAK DIUBAH)
// ================================================================
function startConfirmationDelay(id, direction, entryPrice, macroScore, zoneType) {
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    pendingConfirmation[id] = { direction, entryPrice, macroScore, zoneType };
    const sb = document.getElementById(`signal-bar-${id}`);
    if (sb) sb.classList.add('confirm-wait');
    document.getElementById(`l3-${id}`)?.classList.add('confirm-pending');
    updateSignalUIOnly(id);
    pendingConfirmation[id].timerId = setTimeout(() => {
        if (!pendingConfirmation[id]) return;
        const macroC = getMacroCandles(id);
        const microC = getMicroCandles(id);
        const lp = marketData[id].price || state[id].lastPrice || 0;
        if (macroC.length >= MACRO_MIN && microC.length >= MICRO_MIN) {
            const mb2 = scoreMacroBias(id, lp, macroC);
            const mi2 = scoreMicroEntry(id, lp, microC, mb2);
            const stillValid = mb2.valid && (mb2.bias === 'BULL' ? 'buy' : 'sell') === direction && mi2.ready;
            if (stillValid) {
                executeLockSignal(id, direction, lp, mb2.score, mi2.zoneType || zoneType);
            } else {
                resetSignal(id);
                const st = document.getElementById(`signal-text-${id}`);
                if (st) { st.innerText = 'REJECT'; st.style.color = 'var(--danger)'; setTimeout(() => updateSignalUIOnly(id), 1500); }
            }
        } else { resetSignal(id); }
        pendingConfirmation[id] = null;
    }, CONFIRMATION_WAIT_MS);
}

// ================================================================
//  STATE MANAGEMENT — DIPERBAIKI (TP1 MASUK WINRATE)
// ================================================================

function createFreshState() {
    return { v: LS_SCHEMA_VERSION, lastPrice: 0, macroBias: 'NEUTRAL', macroScore: 0, macroValid: false,
             l1: false, l2: false, l3: false, confirmed: false, confirmedAt: 0, resetInProgress: false,
             warmupUntil: 0, cooldownUntil: 0, type: 'none', entry: 0, sl: 0, tp: 0, rr_used: 1.4,
             tempHigh: 0, tempLow: 0, originPrice: 0, confluenceScore: 0, entryZone: 'NONE', breakevenArmed: false };
}

function loadState(id) {
    try { const r = localStorage.getItem(`ura_state_${id}`); return r ? Object.assign(createFreshState(), JSON.parse(r)) : createFreshState(); } catch(e) { return createFreshState(); }
}

// ── STATS — DIPERBAIKI ──────────────────────────────────────────
function createDefaultStats() { 
    return { 
        tpHits: 0,       // TP2 (full TP)
        tp1Hits: 0,      // TP1 (dulu breakeven) — MASUK WINRATE
        slHits: 0, 
        total: 0, 
        winrate: 0.0 
    }; 
}

function loadPerformanceStats(id) {
    try { 
        const r = localStorage.getItem(`ura_stats_${id}`); 
        if (r) {
            const parsed = JSON.parse(r);
            // Migrasi: breakevenHits → tp1Hits
            if (parsed.breakevenHits !== undefined && parsed.tp1Hits === undefined) {
                parsed.tp1Hits = parsed.breakevenHits;
                delete parsed.breakevenHits;
            }
            if (parsed.tp1Hits === undefined) parsed.tp1Hits = 0;
            return Object.assign(createDefaultStats(), parsed);
        }
        return createDefaultStats(); 
    } catch(e) { 
        return createDefaultStats(); 
    }
}

function savePerformanceStats(id) { 
    try { 
        localStorage.setItem(`ura_stats_${id}`, JSON.stringify(performanceStats[id])); 
    } catch(e) {} 
}

function updateWinrate(id) {
    const s = performanceStats[id];
    
    // Total semua trade: TP2 + TP1 + SL
    s.total = s.tpHits + (s.tp1Hits || 0) + s.slHits;
    
    // Winrate: (TP2 + TP1) / (TP2 + TP1 + SL)
    const wins = s.tpHits + (s.tp1Hits || 0);
    const total = wins + s.slHits;
    
    s.winrate = total > 0 ? parseFloat(((wins / total) * 100).toFixed(1)) : 0.0;
}

function recordSignalResult(id, type) {
    const s = performanceStats[id];
    
    if (type === 'tp') {
        s.tpHits++;          // TP penuh (TP2 di UI)
    } else if (type === 'be') {
        s.tp1Hits++;         // TP1 (dulu breakeven) — SEKARANG MASUK WINRATE
    } else if (type === 'sl') {
        s.slHits++;
    }
    
    updateWinrate(id);
    savePerformanceStats(id);
    updatePerformanceUI(id);
}

// ── Candle Build ──────────────────────────────────────────────────
function buildTFCandle(tf, dur, maxCandles, price, vol) {
    const now = Date.now();
    if (!tf.current || (now - tf.start) >= dur) {
        if (tf.current) { tf.current.closed = true; tf.candles.push({ ...tf.current }); if (tf.candles.length > maxCandles) tf.candles.shift(); }
        tf.current = { open: price, high: price, low: price, close: price, volume: vol || 1, closed: false }; tf.start = now; return true;
    } else {
        tf.current.high = Math.max(tf.current.high, price); tf.current.low = Math.min(tf.current.low, price);
        tf.current.close = price; tf.current.volume += (vol || 1); return false;
    }
}
function buildCandles(id, price, vol) {
    const md = marketData[id]; const macroNew = buildTFCandle(md.macro, MACRO_DUR[id], 220, price, vol);
    buildTFCandle(md.micro, MICRO_DUR[id], 80, price, vol); md.price = price;
    const mc = md.macro.candles.filter(c => c.closed); if (mc.length >= 15) md.atr = calcATR(mc, 14) || md.atr;
    if (macroNew && mc.length >= MACRO_MIN) macroBiasCache[id] = scoreMacroBias(id, price, mc);
}
function getMacroCandles(id) { return marketData[id].macro.candles.filter(c => c.closed); }
function getMicroCandles(id) { return marketData[id].micro.candles.filter(c => c.closed); }

// ── Historical Init ──────────────────────────────────────────────
async function initHistoricalCandles(id) {
    const symbol = 'BTCUSDT'; const limit = 250;
    const sources = [`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1m&limit=${limit}`,
                     `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${limit}`];
    for (const url of sources) {
        try {
            const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 8000);
            const resp = await fetch(url, { signal: ctrl.signal }); clearTimeout(tid);
            if (!resp.ok) continue; const raw = await resp.json();
            if (!Array.isArray(raw) || raw.length < 40) continue;
            const closed = raw.slice(0, -1); const candles = closed.map(k => ({ open: parseFloat(k[1]), high: parseFloat(k[2]), low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5]), closed: true }));
            marketData[id].macro.candles = candles;
            const lastClose = candles[candles.length - 1].close; seedMicroCandles(id, lastClose);
            const mc = getMacroCandles(id); if (mc.length >= 15) marketData[id].atr = calcATR(mc, 14) || (ATR_FALLBACK[id] || 300);
            if (mc.length >= MACRO_MIN) macroBiasCache[id] = null; return true;
        } catch(e) {}
    }
    seedCandles(id, 64000); return false;
}
function seedMicroCandles(id, base) {
    const step = 120; const nMicro = 20;
    marketData[id].micro.candles = []; let price = base;
    for (let i = 0; i < nMicro; i++) {
        const open = price + (Math.random() - 0.5) * step * 0.04;
        const close = open + (Math.random() - 0.48) * step * 0.06;
        const hi = Math.max(open, close) + Math.random() * step * 0.03;
        const lo = Math.min(open, close) - Math.random() * step * 0.03;
        marketData[id].micro.candles.push({ open, high: hi, low: lo, close, volume: 20 + Math.floor(Math.random() * 50), closed: true });
        price = close;
    }
}
function seedCandles(id, base) {
    const step = 120; const nMacro = 55;
    marketData[id].macro.candles = []; let price = base;
    for (let i = 0; i < nMacro; i++) {
        const drift = (Math.random() - 0.48) * step * 0.05; price += drift;
        const open = price; const close = open + (Math.random() - 0.48) * step * 0.28;
        const hi = Math.max(open, close) + Math.random() * step * 0.12;
        const lo = Math.min(open, close) - Math.random() * step * 0.12;
        marketData[id].macro.candles.push({ open, high: hi, low: lo, close, volume: 60 + Math.floor(Math.random() * 120), closed: true });
        price = close;
    }
    seedMicroCandles(id, price); const mc = getMacroCandles(id); if (mc.length >= 15) marketData[id].atr = calcATR(mc, 14) || (ATR_FALLBACK[id] || 300);
}

function updateSignal(id, price, vol) {
    if (signalDebounceTimer[id]) clearTimeout(signalDebounceTimer[id]);
    signalDebounceTimer[id] = setTimeout(() => { processSignal(id, price); signalDebounceTimer[id] = null; }, SIGNAL_DEBOUNCE_MS);
}
function throttledSaveState(id) {
    const s = state[id]; if (!s) return; pendingSaveData[id] = { ...s };
    if (pendingSaveTimer[id]) return;
    pendingSaveTimer[id] = setTimeout(() => { if (pendingSaveData[id]) { try { localStorage.setItem(`ura_state_${id}`, JSON.stringify(pendingSaveData[id])); } catch(e) {} pendingSaveData[id] = null; } pendingSaveTimer[id] = null; }, SAVE_INTERVAL);
}
function throttledUpdateUI(id) {
    if (!rafPending[id]) { rafPending[id] = true; requestAnimationFrame(() => { const p = pendingPriceData[id]; if (p !== null) { updatePriceDisplayOnly(id, p); pendingPriceData[id] = null; } if (pendingSignalData[id]) { updateSignalUIOnly(id); pendingSignalData[id] = false; } rafPending[id] = false; }); }
}
function updatePriceDisplayOnly(id, price) {
    const el = document.getElementById(`price-${id}`); if (!el) return;
    const prev = parseFloat(el.dataset.prev || '0'); el.innerText = price.toFixed(2); el.dataset.prev = price;
    if (prev !== 0 && prev !== price) { el.style.color = price > prev ? 'var(--success)' : 'var(--danger)'; clearTimeout(el._ct); el._ct = setTimeout(() => { el.style.color = ''; }, 280); }
    if (state[id]) updateTracker(id, price);
}
function updateTracker(id, price) {
    const s = state[id]; const t = document.getElementById(`tracker-${id}`);
    if (!s || !s.confirmed || s.type === 'none' || s.entry <= 0) { if (t) { t.innerText = '0'; t.style.color = ''; } return; }
    const dist = s.type === 'buy' ? price - s.entry : s.entry - price;
    if (t) { t.innerText = (Math.round(dist * 100) / 100).toFixed(2); t.style.color = dist >= 0 ? 'var(--emerald)' : 'var(--crimson)'; }
}

// ================================================================
//  updateSignalUIOnly — [BE] → [TP1]
// ================================================================
function updateSignalUIOnly(id) {
    const s = state[id]; 
    if (!s) return;

    // Toggle dots ↔ timer: timer tampil di tengah signal-bar saat signal aktif & !breakevenArmed
    const timerActive = s.confirmed && !s.breakevenArmed && s.type !== 'none';
    const dotGroup = document.getElementById(`signal-dot-group-${id}`);
    const timerEl  = document.getElementById(`timeout-${id}`);
    if (dotGroup) dotGroup.style.display = timerActive ? 'none' : 'flex';
    if (timerEl)  timerEl.style.display  = timerActive ? 'inline' : 'none';

    const setDot = (eid, on, type) => { 
        const el = document.getElementById(eid); 
        if (!el) return; 
        if (!on) el.className = 'dot'; 
        else if (pendingConfirmation[id] && eid === `l3-${id}` && !s.confirmed) el.className = 'dot confirm-pending'; 
        else el.className = type === 'sell' ? 'dot active-down' : 'dot active'; 
    };
    
    setDot(`l1-${id}`, s.l1, s.type); 
    setDot(`l2-${id}`, s.l2, s.type); 
    setDot(`l3-${id}`, s.l3, s.type);
    
    const st = document.getElementById(`signal-text-${id}`);
    if (st) {
        if (!wsStatus[id]) { 
            st.innerText = 'NO FEED'; 
            st.style.color = 'var(--danger)'; 
        }
        else if (pendingConfirmation[id] && s.l3 && !s.confirmed) { 
            st.innerText = 'CONFIRM...'; 
            st.style.color = 'var(--gold)'; 
        }
        else if (s.confirmed) { 
            // [BE] → [TP1]
            const tp1Label = s.breakevenArmed ? ' [TP1]' : ''; 
            st.innerText = s.type.toUpperCase() + tp1Label; 
            st.style.color = s.type === 'buy' ? 'var(--success)' : 'var(--danger)'; 
        }
        else if (s.l3) { 
            st.innerText = 'LOCKED'; 
            st.style.color = 'var(--accent)'; 
        }
        else if (s.l2) { 
            st.innerText = 'READY'; 
            st.style.color = 'var(--accent)'; 
        }
        else if (s.l1) { 
            st.innerText = 'BIAS'; 
            st.style.color = 'var(--amber)'; 
        }
        else { 
            st.innerText = '— WAIT'; 
            st.style.color = 'var(--text-dim)'; 
        }
    }
    
    const eEl = document.getElementById(`entry-${id}`); 
    if (eEl) eEl.innerText = s.confirmed ? s.entry.toFixed(2) : '--';
    const tEl = document.getElementById(`tp-${id}`); 
    if (tEl) tEl.innerText = s.confirmed ? s.tp.toFixed(2) : '--';
    const sEl = document.getElementById(`sl-${id}`); 
    if (sEl) sEl.innerText = s.confirmed ? s.sl.toFixed(2) : '--';
    const rrEl = document.getElementById(`rr-${id}`); 
    if (rrEl) rrEl.innerText = s.confirmed ? s.rr_used.toFixed(1) : '--';
}

function updateEngineBadges(id, mb) {
    if (!mb) return; const f = mb.factors || {};
    const badges = [
        { id: `eb-trend-${id}`, val: f.bc_trend ? f.bc_trend.replace('STRONG_','S-').replace('_PULL','↓').replace('_ZONE','~').replace('_X_BULL','⤢+').replace('_X_BEAR','⤢-').replace('_X','⤢') : 'TRD', cls: (f.bc_trend||'').includes('BULL') ? 'bull' : (f.bc_trend||'').includes('BEAR') ? 'bear' : 'neutral' },
        { id: `eb-struct-${id}`, val: f.bc_struct ? f.bc_struct.replace('_BULL','↑').replace('_BEAR','↓') : 'STR', cls: (f.bc_struct||'').includes('BULL') || f.bc_struct === 'BULLISH' ? 'bull' : (f.bc_struct||'').includes('BEAR') || f.bc_struct === 'BEARISH' ? 'bear' : f.bc_struct === 'CHOCH_BULL' || f.bc_struct === 'CHOCH_BEAR' ? 'active' : 'off' },
        { id: `eb-zone-${id}`, val: f.bc_zone || 'ZNE', cls: f.bc_zone === 'DEMAND' || f.bc_zone === 'NEAR_DEMAND' ? 'bull' : f.bc_zone === 'SUPPLY' || f.bc_zone === 'NEAR_SUPPLY' ? 'bear' : 'off' },
        { id: `eb-flow-${id}`, val: f.bc_flow ? f.bc_flow.replace('_PRESSURE','').replace('MILD_','M-') : 'FLW', cls: (f.bc_flow||'').includes('BUY') ? 'bull' : (f.bc_flow||'').includes('SELL') ? 'bear' : 'neutral' },
        { id: `eb-macd-${id}`, val: f.macd_sig || 'MOM', cls: (f.macd_sig||'').startsWith('BULL') ? 'bull' : (f.macd_sig||'').startsWith('BEAR') ? 'bear' : 'neutral' },
        { id: `eb-adx-${id}`, val: f.adx_class || 'ADX', cls: f.adx_class === 'STRONG' || f.adx_class === 'TREND' ? 'bull' : f.adx_class === 'CHOPPY' ? 'bear' : 'neutral' },
        { id: `eb-conflict-${id}`, val: f.conflict ? 'CONFLICT' : (f.bc_bos ? 'BOS:'+f.bc_bos : 'ALIGN'), cls: f.conflict ? 'bear' : f.bc_bos ? 'active' : 'off' }
    ];
    for (const b of badges) { const el = document.getElementById(b.id); if (el) { el.className = `ebadge ${b.cls}`; el.textContent = b.val; } }
    const sc = document.getElementById(`eb-score-${id}`); if (sc) { const sv = Math.round(mb.score || 0); sc.textContent = `BC:${sv}`; sc.className = 'ebadge score'; sc.style.color = mb.valid ? 'var(--emerald)' : sv >= BC_SCORE_MIN * 0.7 ? 'var(--gold)' : 'var(--text-dim)'; }
    const mcxEl = document.getElementById(`eb-mcross-${id}`);
    if (mcxEl) {
        const mcx         = (mb.factors && mb.factors.micro_cross) ? mb.factors.micro_cross : 'NONE';
        const macroCrossed = mb.factors && mb.factors.just_crossed;
        if (mcx === 'GOLDEN_X' || (macroCrossed && (mb.factors.bc_trend||'').includes('BULL'))) {
            mcxEl.className = 'ebadge bull' + (macroCrossed ? ' pulse' : '');
            mcxEl.textContent = macroCrossed ? 'MX⤢+' : 'GX⤢';
        } else if (mcx === 'DEATH_X' || (macroCrossed && (mb.factors.bc_trend||'').includes('BEAR'))) {
            mcxEl.className = 'ebadge bear' + (macroCrossed ? ' pulse' : '');
            mcxEl.textContent = macroCrossed ? 'MX⤢-' : 'DX⤢';
        } else {
            mcxEl.className = 'ebadge off';
            mcxEl.textContent = 'MCX';
        }
    }
}
function updateConfluenceBar(id, score) {

// ================================================================
//  updatePerformanceUI — TP1 dari tp1Hits
// ================================================================
function updatePerformanceUI(id) {
    const s = performanceStats[id];
    if (!s) return;
    
    const tp1 = document.getElementById(`stats-retrace-${id}`); // TP1
    const tp2 = document.getElementById(`stats-tp-${id}`);      // TP2
    const sl = document.getElementById(`stats-sl-${id}`);
    const wr = document.getElementById(`stats-winrate-${id}`);
    
    // TP1 (dulu breakeven) — warna emas
    if (tp1) {
        tp1.innerText = s.tp1Hits || 0;
        tp1.style.color = 'var(--gold)';
    }
    
    // TP2 (full TP) — warna hijau
    if (tp2) {
        tp2.innerText = s.tpHits;
        tp2.style.color = 'var(--success)';
    }
    
    if (sl) {
        sl.innerText = s.slHits;
        sl.style.color = 'var(--danger)';
    }
    
    // Winrate: (TP2 + TP1) / (TP2 + TP1 + SL)
    if (wr) {
        const wins = s.tpHits + (s.tp1Hits || 0);
        const total = wins + s.slHits;
        const winrate = total > 0 ? ((wins / total) * 100).toFixed(1) : '0.0';
        wr.innerText = `${winrate}%`;
        wr.style.color = parseFloat(winrate) >= 65 ? 'var(--emerald)' : 
                         parseFloat(winrate) >= 50 ? 'var(--gold)' : 'var(--crimson)';
    }
}

    el.className = 'feed-badge';
    if (status === 'ok') { el.textContent = '● WS'; el.classList.add('ok'); }
    else if (status === 'fallback') { el.textContent = '⚡ REST'; el.classList.add('fallback'); }
    else { el.textContent = '✕ ERR'; el.classList.add('err'); }
}
function updateGlobalPulse() { const el = document.getElementById('globalPulse'); if (el) el.className = wsStatus.btc ? 'pulse connected' : 'pulse disconnected'; }
function cancelPendingConfirmation(id) {
    if (!pendingConfirmation[id]) return;
    if (pendingConfirmation[id].timerId) clearTimeout(pendingConfirmation[id].timerId);
    pendingConfirmation[id] = null; document.getElementById(`signal-bar-${id}`)?.classList.remove('confirm-wait'); updateSignalUIOnly(id);
}
function resetSignal(id) {
    const s = state[id]; if (!s || s.resetInProgress) return; s.resetInProgress = true;
    if (pendingConfirmation[id]) cancelPendingConfirmation(id);
    if (signalDebounceTimer[id]) { clearTimeout(signalDebounceTimer[id]); signalDebounceTimer[id] = null; }
    const kept = { lastPrice: s.lastPrice, cooldownUntil: s.cooldownUntil || 0 };
    Object.assign(s, createFreshState(), kept); pendingSignalData[id] = true; updateSignalUIOnly(id);
    const t = document.getElementById(`tracker-${id}`); if (t) t.innerText = '0'; throttledSaveState(id); throttledUpdateUI(id);
    requestAnimationFrame(() => { s.resetInProgress = false; }); setTimeout(() => { s.resetInProgress = false; }, 300);
}
function handleSignalBarTap(id) {
    if (tapTimers[id]) clearTimeout(tapTimers[id]); tapCounters[id]++;
    tapTimers[id] = setTimeout(() => { tapCounters[id] = 0; tapTimers[id] = null; }, TAP_TIMEOUT);
    if (tapCounters[id] === 3) { if (pendingConfirmation[id]) cancelPendingConfirmation(id); resetSignal(id); tapCounters[id] = 0; if (tapTimers[id]) { clearTimeout(tapTimers[id]); tapTimers[id] = null; } if (navigator.vibrate) navigator.vibrate(30); showToast('Signal reset ✓'); }
}

// ================================================================
//  handleHistoryPanelTap — Reset dengan format baru
// ================================================================
function handleHistoryPanelTap(id) {
    if (historyTapTimers[id]) clearTimeout(historyTapTimers[id]);
    historyTapCounters[id]++;
    
    historyTapTimers[id] = setTimeout(() => { 
        historyTapCounters[id] = 0; 
        historyTapTimers[id] = null; 
    }, TAP_TIMEOUT);
    
    if (historyTapCounters[id] === 3) { 
        // Reset dengan format baru (tp1Hits)
        performanceStats[id] = createDefaultStats(); 
        savePerformanceStats(id); 
        updatePerformanceUI(id); 
        historyTapCounters[id] = 0; 
        if (historyTapTimers[id]) { 
            clearTimeout(historyTapTimers[id]); 
            historyTapTimers[id] = null; 
        } 
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]); 
        showToast('History reset ✓'); 
    }
}

         <!-- ═══ PATTERN DETECTION ENGINE PANEL ═══════════════════ -->
        <div class="pde-panel">
          <div class="pde-header">
            <span class="pde-title">Pattern Engine</span>
            <span class="pde-signal-badge neutral" id="pde-signal-${id}">— WAIT</span>
          </div>
          <div class="pde-pattern-row">
            <div class="pde-pattern-name" id="pde-pattern-${id}">Scanning patterns...</div>
          </div>
          <div class="pde-meters-grid">
            <div class="pde-meter-item">
              <span class="pde-meter-label">STRENGTH</span>
              <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-str-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
              <span class="pde-meter-val" id="pde-meter-str-val-${id}" style="color:var(--text-dim)">0%</span>
            </div>
            <div class="pde-meter-item">
              <span class="pde-meter-label">PROBABILITY</span>
              <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-prob-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
              <span class="pde-meter-val" id="pde-meter-prob-val-${id}" style="color:var(--text-dim)">0%</span>
            </div>
            <div class="pde-meter-item">
              <span class="pde-meter-label">RISK</span>
              <div class="pde-meter-bar-wrap"><div class="pde-meter-bar-fill" id="pde-meter-risk-fill-${id}" style="width:0%;background:var(--text-dim)"></div></div>
              <span class="pde-meter-val" id="pde-meter-risk-val-${id}" style="color:var(--text-dim)">—</span>
            </div>
          </div>
        <div class="stats-grid" id="history-panel-${id}">
          <div class="stats-item"><span class="stats-label" style="color:var(--gold)">TP1</span><span class="stats-value be-value" id="stats-retrace-${id}">0</span></div>
          <div class="stats-item"><span class="stats-label">TP2</span><span class="stats-value" id="stats-tp-${id}" style="color:var(--success)">0</span></div>
          <div class="stats-item"><span class="stats-label">SL HIT</span><span class="stats-value" id="stats-sl-${id}" style="color:var(--danger)">0</span></div>
          <div class="stats-item"><span class="stats-label" style="color:var(--gold)">WINRATE</span><span class="stats-value winrate-value" id="stats-winrate-${id}">0%</span></div>
        </div>
      </div>
    </div>`;
}
window.copyValue = (id, type) => {
    const val = document.getElementById(`${type}-${id}`)?.innerText;
    if (val && val !== '--') { navigator.clipboard?.writeText(val).then(() => showToast(`${type.toUpperCase()} copied: ${val}`)).catch(() => showToast(val)); if (navigator.vibrate) navigator.vibrate(50); }
};

// ── Price Feeds ──────────────────────────────────────────────────
let btcWs = null, btcReconnectTimer = null, btcReconnectAttempts = 0;
let btcFetchRetryTimer = null, btcCurrentPrice = 0, btcLastHeartbeat = Date.now();
const BTC_REST_SOURCES = [
    { url: 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT', parse: (d) => d?.price ? parseFloat(d.price) : null },
    { url: 'https://fapi.binance.com/fapi/v1/ticker/price?symbol=BTCUSDT', parse: (d) => d?.price ? parseFloat(d.price) : null }
]; let btcRestIdx = 0;

function updateBTCDisplay(price, feedStatus, vol) {
    if (!price || isNaN(price) || price < 1000 || price > 2000000) return;
    price = price + PRICE_OFFSET_BTC; btcCurrentPrice = price; btcLastHeartbeat = Date.now();
    pendingPriceData.btc = price; pendingSignalData.btc = true; throttledUpdateUI('btc'); updateSignal('btc', price, vol || 0);
    wsStatus.btc = true; updateGlobalPulse();
    const el = document.getElementById('ws-status-btc'); if (el) { el.textContent = '● LIVE'; el.className = 'ws-status connected'; }
    if (feedStatus) updateFeedBadge('btc', feedStatus);
}
async function btcFetchRestPrice() {
    if (btcFetching) return;
    btcFetching = true;
    try {
        for (let i = 0; i < BTC_REST_SOURCES.length; i++) {
            const src = BTC_REST_SOURCES[(btcRestIdx + i) % BTC_REST_SOURCES.length];
            try {
                const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), 7000);
                const resp = await fetch(src.url, { signal: ctrl.signal }); clearTimeout(tid);
                if (!resp.ok) continue; const data = await resp.json(); const p = src.parse(data);
                if (p && p > 1000 && !isNaN(p)) { updateBTCDisplay(p, i === 0 ? 'ok' : 'fallback', 0); btcRestIdx = (btcRestIdx + i) % BTC_REST_SOURCES.length; return true; }
            } catch(e) {}
        }
        wsStatus.btc = false; updateGlobalPulse(); updateSignalUIOnly('btc');
        updateFeedBadge('btc', 'err'); return false;
    } finally {
        btcFetching = false;
    }
}
function initBTCWebSocket() {
    if (btcWs) { try { btcWs.close(); } catch(e) {} btcWs = null; }
    if (btcReconnectTimer) clearTimeout(btcReconnectTimer);
    try {
        btcWs = new WebSocket(BTC_WS_URL);
        const wst = setTimeout(() => { if (btcWs && btcWs.readyState !== WebSocket.OPEN) { try { btcWs.close(); } catch(e) {} btcWs = null; wsStatus.btc = false; updateFeedBadge('btc', 'fallback'); updateGlobalPulse(); } }, 7000);
        btcWs.onopen = () => { clearTimeout(wst); btcReconnectAttempts = 0; wsStatus.btc = true; updateFeedBadge('btc', 'ok'); updateGlobalPulse(); updateSignalUIOnly('btc'); };
        btcWs.onmessage = (e) => {
            try {
                const d = JSON.parse(e.data);
                if (d.p) {
                    const p = parseFloat(d.p);
                    if (isNaN(p) || p <= 1000) return;
                    // Refresh heartbeat SEBELUM cek duplikasi agar feed tidak dianggap stale
                    btcLastHeartbeat = Date.now();
                    wsStatus.btc = true;
                    updateGlobalPulse();
                    // Skip price update jika harga tidak berubah
                    if (p === rawBtcPrice) return;
                    rawBtcPrice = p;
                    const q = parseFloat(d.q) || 0;
                    updateBTCDisplay(p, 'ok', q);
                }
            } catch(err) {}
        };
        btcWs.onclose = () => {
            wsStatus.btc = false;
            updateGlobalPulse();
            updateSignalUIOnly('btc');
            const delay = Math.min(1000 * Math.pow(1.6, btcReconnectAttempts), 20000);
            btcReconnectAttempts++;
            btcReconnectTimer = setTimeout(() => initBTCWebSocket(), delay);
            updateFeedBadge('btc', 'fallback');
        };
        btcWs.onerror = () => { 
            wsStatus.btc = false; 
            updateFeedBadge('btc', 'fallback'); 
            updateGlobalPulse(); 
            updateSignalUIOnly('btc'); 
        };
    } catch(err) { updateFeedBadge('btc', 'fallback'); }
}

function consolidatedPoll() {
    const btcConnected = btcWs && btcWs.readyState === WebSocket.OPEN;
    if (!btcConnected || (Date.now() - btcLastHeartbeat) > 6000) {
        if (!btcFetching) btcFetchRestPrice();
    }
    updateGlobalPulse();
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
    checkAndMigrateSchema();
    state.btc = loadState('btc');
    performanceStats.btc = loadPerformanceStats('btc');
    updateWinrate('btc');
    loadZones('btc');
    document.getElementById('terminals').innerHTML = buildCardHTML('btc', 'BTCUSD');

    const bindTap = (el, handler) => { if (!el) return; let lastTap = 0; const h = (e) => { e.preventDefault(); const now = Date.now(); if (now - lastTap < 80) return; lastTap = now; handler(); }; el.addEventListener('touchstart', h, { passive: false }); el.addEventListener('click', h); };
    bindTap(document.getElementById('signal-bar-btc'), () => handleSignalBarTap('btc'));
    bindTap(document.getElementById('history-panel-btc'), () => handleHistoryPanelTap('btc'));

    updateSignalUIOnly('btc'); updatePerformanceUI('btc');
    updateFeedBadge('btc', 'fallback');
    const el_btc = document.getElementById('ws-status-btc');
    if (el_btc) { el_btc.textContent = '● LOADING...'; el_btc.className = 'ws-status connected'; }

    await initHistoricalCandles('btc');

    initBTCWebSocket();
    await btcFetchRestPrice();

    updateGlobalPulse();

    setInterval(consolidatedPoll, 3000);

    // ── Countdown timer — di tengah signal-bar, tiap 1 detik ─────────
    setInterval(() => {
        const s = state.btc;
        const dotGroup = document.getElementById('signal-dot-group-btc');
        const el       = document.getElementById('timeout-btc');
        if (!el || !dotGroup) return;

        const timerActive = s && s.confirmed && !s.breakevenArmed && s.type !== 'none';

        // Kalau tidak ada signal aktif → tampilkan dots, sembunyikan timer
        if (!timerActive) {
            dotGroup.style.display = 'flex';
            el.style.display = 'none';
            return;
        }

        // Ada signal aktif → sembunyikan dots, tampilkan timer
        dotGroup.style.display = 'none';
        el.style.display = 'inline';

        const elapsed   = Date.now() - (s.confirmedAt || 0);
        const remaining = SIGNAL_TIMEOUT_MS - elapsed;
        if (remaining <= 0) {
            el.textContent = '00:00';
            el.className = 'signal-timer-inline danger';
            return;
        }
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        el.textContent = String(minutes).padStart(2,'0') + ':' + String(seconds).padStart(2,'0');
        el.className = remaining <= 5 * 60 * 1000 ? 'signal-timer-inline amber' : 'signal-timer-inline';
    }, 1000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            if (!btcFetching) btcFetchRestPrice();
            updateSignalUIOnly('btc');
            updateGlobalPulse();
        }
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
