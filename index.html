<script>
(function () {
'use strict';

// ================================================================
//  URADVISOR — BLUE CHART ENGINE v11.2  [SMC ULTRA EDITION]
//  TP1 MASUK WINRATE:
//  - BE → TP1
//  - TP1 masuk perhitungan winrate
//  - Winrate = (TP2 + TP1) / (TP2 + TP1 + SL)
// ================================================================

const LS_SCHEMA_VERSION    = 12;  // bumped untuk TP1 masuk winrate
const ATR_FALLBACK         = { btc: 300 };
const BTC_WS_URL           = 'wss://stream.binance.com:9443/ws/btcusdt@trade';
const CONFIRMATION_WAIT_MS = 1500;
const SIGNAL_TIMEOUT_MS    = 30 * 60 * 1000; // 30 menit

// ================================================================
//  LIVE PRICE OFFSET
// ================================================================
const PRICE_OFFSET_BTC = -48;
const COOLDOWN_AFTER_SL_MS = 15000;

// ── Blue Chart Timeframe Durations ────────────────────────────────
const MACRO_DUR = { btc: 60000 };
const MICRO_DUR = { btc: 15000 };

// ── Candle minimums ───────────────────────────────────────────────
const MACRO_MIN = 35;
const MICRO_MIN = 10;

// ── Blue Chart Score thresholds ───────────────────────────────────
const BC_SCORE_MIN = 75;
const ADX_MIN      = 25;

// ── Micro entry thresholds ──────────────────────────────────────
const MICRO_READY_THRESHOLD = 55;
const MICRO_LOCK_THRESHOLD  = 70;

// ── Persistent Zone TTL & limits ─────────────────────────────────
const ZONE_TTL_MS  = 4 * 60 * 60 * 1000;   // 4 hours
const ZONE_MAX     = 12;

// ================================================================
//  SCHEMA MIGRATION
// ================================================================
function checkAndMigrateSchema() {
    const v = parseInt(localStorage.getItem('ura_schema_ver') || '1', 10);
    if (v < LS_SCHEMA_VERSION) {
        ['btc'].forEach(id => {
            localStorage.removeItem(`ura_state_${id}`);
            localStorage.removeItem(`ura_stats_${id}`);
            localStorage.removeItem(`ura_zones_${id}`);
        });
        localStorage.setItem('ura_schema_ver', String(LS_SCHEMA_VERSION));
    }
}

// ── Toast ────────────────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_tt) clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ================================================================
//  INDICATOR LIBRARY (TIDAK DIUBAH)
// ================================================================

function calcEMA(arr, period) {
    if (!arr || arr.length < period) return null;
    const k = 2 / (period + 1);
    let e = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
    return e;
}

function calcRSI(closes, period) {
    period = period || 14;
    if (!closes || closes.length < period + 1) return null;
    const r = closes.slice(-(period + 1));
    let g = 0, l = 0;
    for (let i = 1; i < r.length; i++) {
        const d = r[i] - r[i - 1];
        if (d > 0) g += d; else l -= d;
    }
    const ag = g / period, al = l / period;
    if (al === 0) return 100;
    return 100 - 100 / (1 + ag / al);
}

function calcMACD(closes, fast, slow, sig) {
    fast = fast || 12; slow = slow || 26; sig = sig || 9;
    if (!closes || closes.length < slow + sig) return null;
    const kFast = 2 / (fast + 1);
    const kSlow = 2 / (slow + 1);
    const kSig  = 2 / (sig  + 1);
    let emaFast = 0;
    for (let i = 0; i < fast; i++) emaFast += closes[i];
    emaFast /= fast;
    for (let i = fast; i < slow; i++) emaFast = closes[i] * kFast + emaFast * (1 - kFast);
    let emaSlow = 0;
    for (let i = 0; i < slow; i++) emaSlow += closes[i];
    emaSlow /= slow;
    const macdLine = [];
    for (let i = slow - 1; i < closes.length; i++) {
        emaFast = closes[i] * kFast + emaFast * (1 - kFast);
        if (i >= slow - 1) emaSlow = closes[i] * kSlow + emaSlow * (1 - kSlow);
        macdLine.push(emaFast - emaSlow);
    }
    if (macdLine.length < sig) return null;
    let sigVal = 0;
    for (let i = 0; i < sig; i++) sigVal += macdLine[i];
    sigVal /= sig;
    for (let i = sig; i < macdLine.length; i++) sigVal = macdLine[i] * kSig + sigVal * (1 - kSig);
    const line = macdLine[macdLine.length - 1];
    return { line, signal: sigVal, hist: line - sigVal };
}

function calcATR(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        trs.push(Math.max(
            candles[i].high - candles[i].low,
            Math.abs(candles[i].high - candles[i - 1].close),
            Math.abs(candles[i].low  - candles[i - 1].close)
        ));
    }
    return trs.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function calcADX(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period * 2 + 2) return null;
    const c = candles.slice(-(period * 2 + 2));
    const dmP = [], dmM = [], tr = [];
    for (let i = 1; i < c.length; i++) {
        const up = c[i].high  - c[i-1].high;
        const dn = c[i-1].low - c[i].low;
        dmP.push(up > dn && up > 0 ? up : 0);
        dmM.push(dn > up && dn > 0 ? dn : 0);
        tr.push(Math.max(
            c[i].high - c[i].low,
            Math.abs(c[i].high - c[i-1].close),
            Math.abs(c[i].low  - c[i-1].close)
        ));
    }
    let atr14 = tr.slice(0, period).reduce((a,b) => a+b, 0);
    let pdm14  = dmP.slice(0, period).reduce((a,b) => a+b, 0);
    let mdm14  = dmM.slice(0, period).reduce((a,b) => a+b, 0);
    const dxArr = [];
    const push_dx = (a, p, m) => {
        const pdi = a > 0 ? (p/a)*100 : 0;
        const mdi = a > 0 ? (m/a)*100 : 0;
        dxArr.push((pdi+mdi) > 0 ? Math.abs(pdi-mdi)/(pdi+mdi)*100 : 0);
    };
    push_dx(atr14, pdm14, mdm14);
    for (let i = period; i < tr.length; i++) {
        atr14 = atr14 - atr14/period + tr[i];
        pdm14  = pdm14  - pdm14/period  + dmP[i];
        mdm14  = mdm14  - mdm14/period  + dmM[i];
        push_dx(atr14, pdm14, mdm14);
    }
    if (dxArr.length < period) return null;
    return dxArr.slice(-period).reduce((a,b) => a+b, 0) / period;
}

// ================================================================

function calcBCTrend(closes, atr) {
    const n = closes.length;
    const ema21  = calcEMA(closes, Math.min(21, n - 1));
    const ema50  = calcEMA(closes, Math.min(50, n - 1));
    const ema200Period = n >= 200 ? 200 : n >= 100 ? 100 : n >= 50 ? 50 : Math.max(20, n - 1);
    const ema200 = calcEMA(closes, ema200Period);
    const hasEma200 = n >= 200;
    if (!ema21 || !ema50 || !ema200) return { trend: 'NEUTRAL', score: 0, ema21, ema50, ema200 };
    const SLOPE_WINDOW = Math.min(10, n - 2);
    const ema21Prev = SLOPE_WINDOW > 0 ? calcEMA(closes.slice(0, -SLOPE_WINDOW), Math.min(21, n - SLOPE_WINDOW - 1)) : null;
    const ema50Prev = SLOPE_WINDOW > 0 ? calcEMA(closes.slice(0, -SLOPE_WINDOW), Math.min(50, n - SLOPE_WINDOW - 1)) : null;
    const slope21 = (ema21Prev && atr) ? (ema21 - ema21Prev) / atr : 0;
    const slope50 = (ema50Prev && atr) ? (ema50 - ema50Prev) / atr : 0;
    const SLOPE_MIN = 0.08;
    const CROSS_LOOKBACK = Math.min(5, n - 2);
    const ema21_lb = n > CROSS_LOOKBACK + 1
        ? calcEMA(closes.slice(0, -CROSS_LOOKBACK), Math.min(21, n - CROSS_LOOKBACK - 1))
        : null;
    const ema50_lb = n > CROSS_LOOKBACK + 1
        ? calcEMA(closes.slice(0, -CROSS_LOOKBACK), Math.min(50, n - CROSS_LOOKBACK - 1))
        : null;
    const justCrossedUp   = ema21_lb !== null && ema50_lb !== null && ema21_lb < ema50_lb && ema21 >= ema50;
    const justCrossedDown = ema21_lb !== null && ema50_lb !== null && ema21_lb > ema50_lb && ema21 <= ema50;
    const fullBull = ema21 > ema50 && ema50 > ema200;
    const fullBear = ema21 < ema50 && ema50 < ema200;
    const zoneBull = ema21 > ema50 && ema21 < ema200;
    const zoneBear = ema21 < ema50 && ema21 > ema200;
    let trend = 'NEUTRAL', score = 0;
    if      (justCrossedUp   && ema21 <= ema200)  { trend = 'BULL_X';      score =  16; }
    else if (justCrossedUp   && fullBull)          { trend = 'BULL_X_BULL'; score =  28; }
    else if (justCrossedDown && ema21 >= ema200)  { trend = 'BEAR_X';      score = -16; }
    else if (justCrossedDown && fullBear)          { trend = 'BEAR_X_BEAR'; score = -28; }
    else if (fullBull && slope21 >  SLOPE_MIN && slope50 > 0) { trend = 'STRONG_BULL'; score =  30; }
    else if (fullBull && slope21 >= -SLOPE_MIN)                { trend = 'BULL';        score =  22; }
    else if (fullBull && slope21 <  -SLOPE_MIN)                { trend = 'BULL_PULL';   score =  12; }
    else if (fullBear && slope21 < -SLOPE_MIN && slope50 < 0)  { trend = 'STRONG_BEAR'; score = -30; }
    else if (fullBear && slope21 <=  SLOPE_MIN)                { trend = 'BEAR';        score = -22; }
    else if (fullBear && slope21 >   SLOPE_MIN)                { trend = 'BEAR_PULL';   score = -12; }
    else if (zoneBull)                                         { trend = 'BULL_ZONE';   score =  10; }
    else if (zoneBear)                                         { trend = 'BEAR_ZONE';   score = -10; }
    return { trend, score, ema21, ema50, ema200, slope21, slope50, hasEma200, justCrossedUp, justCrossedDown };
}

function calcBCStruct(candles) {
    if (!candles || candles.length < 20) return { struct: 'UNCLEAR', bos: null, choch: false, swingHighs: [], swingLows: [] };
    const rc = candles.slice(-60);
    const swingHighs = [], swingLows = [];
    for (let i = 2; i < rc.length - 1; i++) {
        if (rc[i].high > rc[i-1].high && rc[i].high > rc[i-2].high && rc[i].high > rc[i+1].high) swingHighs.push({ idx: i, price: rc[i].high });
        if (rc[i].low < rc[i-1].low && rc[i].low < rc[i-2].low && rc[i].low < rc[i+1].low) swingLows.push({ idx: i, price: rc[i].low });
    }
    const lastClose = rc[rc.length - 1].close;
    let struct = 'UNCLEAR', bos = null, choch = false, score = 0;
    if (swingHighs.length >= 2 && swingLows.length >= 2) {
        const sh1 = swingHighs[swingHighs.length - 1];
        const sh2 = swingHighs[swingHighs.length - 2];
        const sl1 = swingLows[swingLows.length - 1];
        const sl2 = swingLows[swingLows.length - 2];
        const higherHighs = sh1.price > sh2.price;
        const higherLows  = sl1.price > sl2.price;
        const lowerHighs  = sh1.price < sh2.price;
        const lowerLows   = sl1.price < sl2.price;
        if (lastClose > sh1.price) { struct = 'BOS_BULL'; bos = 'BULL'; score = 20; }
        else if (lastClose < sl1.price) { struct = 'BOS_BEAR'; bos = 'BEAR'; score = -20; }
        else if (higherHighs && higherLows) { struct = 'BULLISH'; score = 15; }
        else if (lowerHighs && lowerLows) { struct = 'BEARISH'; score = -15; }
        if (lowerHighs && lowerLows && lastClose > sh1.price) { struct = 'CHOCH_BULL'; choch = true; bos = 'BULL'; score = 20; }
        else if (higherHighs && higherLows && lastClose < sl1.price) { struct = 'CHOCH_BEAR'; choch = true; bos = 'BEAR'; score = -20; }
    }
    return { struct, bos, choch, swingHighs, swingLows, score, lastClose };
}

function updatePersistentZones(id, candles, price, atr) {

        } else {

function calcBCZone(id, candles, price, atr) {
    if (!candles || candles.length < 15 || !atr) return { zone: 'NONE', proximity: 0, score: 0 };

function calcBCZoneFallback(candles, price, atr) {

    }

    for (const dz of demandZones) { if (price >= dz.bot - tol && price <= dz.top + tol) { nearDemand = true; demandDist = 0; } else { const d = Math.min(Math.abs(price-dz.top), Math.abs(price-dz.bot)); if (d < demandDist) demandDist = d; } }
    let nearSupply = false, supplyDist = Infinity;
    for (const sz of supplyZones) { if (price >= sz.bot - tol && price <= sz.top + tol) { nearSupply = true; supplyDist = 0; } else { const d = Math.min(Math.abs(price-sz.bot), Math.abs(price-sz.top)); if (d < supplyDist) supplyDist = d; } }
    let zone = 'NONE', score = 0, proximity = 0;

// ================================================================

function calcBCFlow(candles, lookback) {
    lookback = lookback || 10;
    if (!candles || candles.length < lookback) return { flow: 'NEUTRAL', delta: 0, score: 0 };
    const rc = candles.slice(-lookback);
    let buyVol = 0, sellVol = 0;
    for (const c of rc) {
        const range = c.high - c.low; if (range === 0) continue;
        const upperWick = c.high - Math.max(c.open, c.close);
        const lowerWick = Math.min(c.open, c.close) - c.low;
        const bodyUp = c.close > c.open ? c.close - c.open : 0;
        const bodyDn = c.close < c.open ? c.open - c.close : 0;
        const v = c.volume || 1;
        buyVol  += v * (lowerWick + bodyUp) / range;
        sellVol += v * (upperWick + bodyDn) / range;
    }
    const total = buyVol + sellVol;
    const delta = total > 0 ? (buyVol - sellVol) / total : 0;
    let flow = 'NEUTRAL', score = 0;
    if (delta > 0.20)       { flow = 'BUY_PRESSURE';   score = 12; }
    else if (delta > 0.08)  { flow = 'MILD_BUY';       score = 7;  }
    else if (delta < -0.20) { flow = 'SELL_PRESSURE';  score = -12; }
    else if (delta < -0.08) { flow = 'MILD_SELL';      score = -7; }
    return { flow, delta: parseFloat(delta.toFixed(3)), score };
}

function calcBCLiquid(candles, atr) {
    if (!candles || candles.length < 8) return { sweep: 'NONE', quality: 0 };
    const rc  = candles.slice(-8); const tol = atr * 0.25;
    const refBars   = rc.slice(0, 6);
    const maxHigh   = Math.max(...refBars.map(c => c.high));
    const minLow    = Math.min(...refBars.map(c => c.low));
    const eqHighCount = refBars.filter(c => Math.abs(c.high - maxHigh) < tol).length;
    const eqLowCount  = refBars.filter(c => Math.abs(c.low  - minLow)  < tol).length;
    const last2   = rc.slice(-2); const lastBar = rc[rc.length - 1];
    if (eqLowCount >= 2) {
        const swept    = last2.some(c => c.low < minLow - tol * 0.3);
        const recovered = lastBar.close > minLow;
        const pinBar   = (Math.min(lastBar.open, lastBar.close) - lastBar.low) > Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) return { sweep: 'BULL_SWEEP', quality: pinBar ? 90 : 70, level: minLow };
    }
    if (eqHighCount >= 2) {
        const swept    = last2.some(c => c.high > maxHigh + tol * 0.3);
        const recovered = lastBar.close < maxHigh;
        const pinBar   = (lastBar.high - Math.max(lastBar.open, lastBar.close)) > Math.abs(lastBar.close - lastBar.open) * 1.2;
        if (swept && recovered) return { sweep: 'BEAR_SWEEP', quality: pinBar ? 90 : 70, level: maxHigh };
    }
    return { sweep: 'NONE', quality: 0 };
}

// ================================================================

// ================================================================
function calcBCDiverg(candles, closes, rsi) {
    if (!candles || candles.length < 20 || rsi === null) return { diverg: 'NONE', strength: 0 };
    const n = closes.length; if (n < 20) return { diverg: 'NONE', strength: 0 };
    const lookback = Math.min(40, n); const startIdx = n - lookback;
    const pts = [];
    for (let i = startIdx; i < n; i++) {
        const r = calcRSI(closes.slice(0, i + 1), 14);
        const cOff = candles.length - (n - i);
        const c    = (cOff >= 0 && cOff < candles.length) ? candles[cOff] : null;
        if (r !== null && c) pts.push({ price: c.close, high: c.high, low: c.low, rsi: r });
    }
    if (pts.length < 10) return { diverg: 'NONE', strength: 0 };
    const swingLows  = [], swingHighs = [];
    for (let i = 2; i < pts.length - 1; i++) {
        const p = pts[i];
        if (p.low  <= pts[i-1].low  && p.low  <= pts[i-2].low  && p.low  <= pts[i+1].low) swingLows.push(p);
        if (p.high >= pts[i-1].high && p.high >= pts[i-2].high && p.high >= pts[i+1].high) swingHighs.push(p);
    }
    let diverg = 'NONE', strength = 0;
    if (swingLows.length >= 2 && rsi < 50) {
        const sl1 = swingLows[swingLows.length - 2]; const sl2 = swingLows[swingLows.length - 1];
        if (sl2.price < sl1.price && sl2.rsi > sl1.rsi + 2) { const rsiDiff = sl2.rsi - sl1.rsi; strength = Math.min(100, rsiDiff * 3); diverg = 'BULL_DIV'; }
    }
    if (diverg === 'NONE' && swingHighs.length >= 2 && rsi > 50) {
        const sh1 = swingHighs[swingHighs.length - 2]; const sh2 = swingHighs[swingHighs.length - 1];
        if (sh2.price > sh1.price && sh2.rsi < sh1.rsi - 2) { const rsiDiff = sh1.rsi - sh2.rsi; strength = Math.min(100, rsiDiff * 3); diverg = 'BEAR_DIV'; }
    }
    return { diverg, strength };
}

// ── 1. ADDITIONAL INDICATORS ────────────────────────────────────

function calcCCI(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period) return null;
    const rc = candles.slice(-period);
    const tps = rc.map(c => (c.high + c.low + c.close) / 3);
    const sma = tps.reduce((a,b)=>a+b,0) / period;
    const md  = tps.reduce((a,b)=>a+Math.abs(b-sma),0) / period;
    return md === 0 ? 0 : (tps[tps.length-1] - sma) / (0.015 * md);
}

function calcStochastic(candles, kPeriod, dPeriod) {
    kPeriod = kPeriod || 14; dPeriod = dPeriod || 3;
    if (!candles || candles.length < kPeriod + dPeriod) return null;
    const kArr = [];
    for (let i = kPeriod - 1; i < candles.length; i++) {
        const sl = candles.slice(i - kPeriod + 1, i + 1);
        const hh = Math.max(...sl.map(c=>c.high));
        const ll = Math.min(...sl.map(c=>c.low));
        kArr.push(hh === ll ? 50 : ((candles[i].close - ll) / (hh - ll)) * 100);
    }
    if (kArr.length < dPeriod) return null;
    const k = kArr[kArr.length-1];
    const d = kArr.slice(-dPeriod).reduce((a,b)=>a+b,0) / dPeriod;
    return { k, d };
}

function calcWilliamsR(candles, period) {
    period = period || 14;
    if (!candles || candles.length < period) return null;
    const rc = candles.slice(-period);
    const hh = Math.max(...rc.map(c=>c.high));
    const ll = Math.min(...rc.map(c=>c.low));
    const close = rc[rc.length-1].close;
    return hh === ll ? -50 : ((hh - close) / (hh - ll)) * -100;
}

function calcAO(candles) {
    if (!candles || candles.length < 34) return null;
    const med = candles.map(c => (c.high + c.low) / 2);
    const sma5  = med.slice(-5).reduce((a,b)=>a+b,0) / 5;
    const sma34 = med.slice(-34).reduce((a,b)=>a+b,0) / 34;
    return sma5 - sma34;
}

function calcROC(closes, period) {
    period = period || 10;
    if (!closes || closes.length < period + 1) return null;
    const now  = closes[closes.length - 1];
    const prev = closes[closes.length - 1 - period];
    return prev !== 0 ? ((now - prev) / prev) * 100 : 0;
}

function calcBollingerBands(closes, period, mult) {
    period = period || 20; mult = mult || 2;
    if (!closes || closes.length < period) return null;
    const rc  = closes.slice(-period);
    const sma = rc.reduce((a,b)=>a+b,0) / period;
    const variance = rc.reduce((a,b)=>a+Math.pow(b-sma,2),0) / period;
    const sigma = Math.sqrt(variance);
    const upper = sma + mult * sigma;
    const lower = sma - mult * sigma;
    const width = sma > 0 ? (upper - lower) / sma * 100 : 0;
    const pctB  = (upper - lower) > 0 ? (closes[closes.length-1] - lower) / (upper - lower) * 100 : 50;
    return { upper, lower, mid: sma, sigma, width, pctB };
}

function calcSuperTrend(candles, period, mult) {
    period = period || 10; mult = mult || 3;
    if (!candles || candles.length < period + 1) return null;
    const n = candles.length;
    let stDir = 1; // 1 = uptrend, -1 = downtrend
    let prevUp = 0, prevDn = 0, prevST = 0;
    for (let i = period; i < n; i++) {
        const sl = candles.slice(i - period, i);
        const atr = sl.reduce((acc, c, idx) => {
            if (idx === 0) return acc;
            return acc + Math.max(c.high - c.low, Math.abs(c.high - sl[idx-1].close), Math.abs(c.low - sl[idx-1].close));
        }, 0) / (period - 1);
        const hl2 = (candles[i].high + candles[i].low) / 2;
        let basicUp = hl2 - mult * atr;
        let basicDn = hl2 + mult * atr;
        const up = (i > period && basicUp < prevUp && candles[i-1].close > prevUp) ? basicUp : Math.max(basicUp, prevUp);
        const dn = (i > period && basicDn > prevDn && candles[i-1].close < prevDn) ? basicDn : Math.min(basicDn, prevDn);
        if (candles[i].close > prevST) stDir = 1; else if (candles[i].close < prevST) stDir = -1;
        prevST = stDir === 1 ? up : dn;
        prevUp = up; prevDn = dn;
    }
    const last = candles[n-1];
    return { direction: stDir, value: prevST, bull: stDir === 1, bear: stDir === -1, dist: Math.abs(last.close - prevST) };
}

// ── 2. CANDLESTICK PATTERN DETECTOR ────────────────────────────

function detectCandlePatterns(candles) {
    if (!candles || candles.length < 3) return [];
    const patterns = [];
    const n = candles.length;
    const c1 = candles[n-3], c2 = candles[n-2], c3 = candles[n-1];
    const range1 = c1.high - c1.low || 0.0001;
    const range2 = c2.high - c2.low || 0.0001;
    const range3 = c3.high - c3.low || 0.0001;
    const body1 = Math.abs(c1.close - c1.open);
    const body2 = Math.abs(c2.close - c2.open);
    const body3 = Math.abs(c3.close - c3.open);
    const uw3 = c3.high - Math.max(c3.open, c3.close);
    const lw3 = Math.min(c3.open, c3.close) - c3.low;
    const uw2 = c2.high - Math.max(c2.open, c2.close);
    const lw2 = Math.min(c2.open, c2.close) - c2.low;

    // ── Single-candle patterns (c3) ─────────────────────────────
    // Doji
    if (body3 < range3 * 0.08 && range3 > 0) patterns.push({ name: 'Doji', dir: 'neutral', score: 4 });
    // Spinning Top
    if (body3 < range3 * 0.25 && lw3 > body3 * 0.5 && uw3 > body3 * 0.5) patterns.push({ name: 'Spinning Top', dir: 'neutral', score: 3 });
    // Hammer (bullish)
    if (c3.close >= c3.open && lw3 > body3 * 2.0 && uw3 < body3 * 0.6 && body3 > range3 * 0.05) patterns.push({ name: 'Hammer', dir: 'bull', score: 10 });
    // Inverted Hammer (bullish potential)
    if (c3.close >= c3.open && uw3 > body3 * 2.0 && lw3 < body3 * 0.6 && body3 > range3 * 0.05) patterns.push({ name: 'Inverted Hammer', dir: 'bull', score: 7 });
    // Shooting Star (bearish)
    if (c3.close <= c3.open && uw3 > body3 * 2.0 && lw3 < body3 * 0.5 && body3 > range3 * 0.05) patterns.push({ name: 'Shooting Star', dir: 'bear', score: 10 });
    // Hanging Man (bearish)
    if (c3.close <= c3.open && lw3 > body3 * 2.0 && uw3 < body3 * 0.5 && body3 > range3 * 0.05) patterns.push({ name: 'Hanging Man', dir: 'bear', score: 7 });
    // Marubozu Bull
    if (c3.close > c3.open && uw3 < range3 * 0.05 && lw3 < range3 * 0.05 && body3 > range3 * 0.85) patterns.push({ name: 'Bullish Marubozu', dir: 'bull', score: 12 });
    // Marubozu Bear
    if (c3.close < c3.open && uw3 < range3 * 0.05 && lw3 < range3 * 0.05 && body3 > range3 * 0.85) patterns.push({ name: 'Bearish Marubozu', dir: 'bear', score: 12 });
    // Pin Bar Bull
    if (lw3 > range3 * 0.60 && body3 < range3 * 0.25) patterns.push({ name: 'Bullish Pin Bar', dir: 'bull', score: 11 });
    // Pin Bar Bear
    if (uw3 > range3 * 0.60 && body3 < range3 * 0.25) patterns.push({ name: 'Bearish Pin Bar', dir: 'bear', score: 11 });

    // ── Two-candle patterns (c2, c3) ───────────────────────────
    // Bullish Engulfing: c2 bearish, c3 bullish and engulfs c2
    if (c2.close < c2.open && c3.close > c3.open && c3.open <= c2.close && c3.close >= c2.open) patterns.push({ name: 'Bullish Engulfing', dir: 'bull', score: 15 });
    // Bearish Engulfing: c2 bullish, c3 bearish and engulfs c2
    if (c2.close > c2.open && c3.close < c3.open && c3.open >= c2.close && c3.close <= c2.open) patterns.push({ name: 'Bearish Engulfing', dir: 'bear', score: 15 });
    // Bullish Harami: c2 bearish large, c3 small bullish inside
    if (c2.close < c2.open && body2 > range2 * 0.6 && c3.close > c3.open && c3.open > c2.close && c3.close < c2.open && body3 < body2 * 0.5) patterns.push({ name: 'Bullish Harami', dir: 'bull', score: 8 });
    // Bearish Harami: c2 bullish large, c3 small bearish inside
    if (c2.close > c2.open && body2 > range2 * 0.6 && c3.close < c3.open && c3.open < c2.close && c3.close > c2.open && body3 < body2 * 0.5) patterns.push({ name: 'Bearish Harami', dir: 'bear', score: 8 });
    // Inside Bar
    if (c3.high < c2.high && c3.low > c2.low) patterns.push({ name: 'Inside Bar', dir: c3.close > c3.open ? 'bull' : 'bear', score: 7 });
    // Outside Bar
    if (c3.high > c2.high && c3.low < c2.low) patterns.push({ name: 'Outside Bar', dir: c3.close > c3.open ? 'bull' : 'bear', score: 8 });
    // Tweezer Bottom: similar lows, c2 bear c3 bull
    if (c2.close < c2.open && c3.close > c3.open && Math.abs(c3.low - c2.low) < (range2 + range3) * 0.06) patterns.push({ name: 'Tweezer Bottom', dir: 'bull', score: 9 });
    // Tweezer Top: similar highs, c2 bull c3 bear
    if (c2.close > c2.open && c3.close < c3.open && Math.abs(c3.high - c2.high) < (range2 + range3) * 0.06) patterns.push({ name: 'Tweezer Top', dir: 'bear', score: 9 });

    // ── Three-candle patterns (c1, c2, c3) ─────────────────────
    // Morning Star: c1 bearish, c2 small, c3 bullish strong
    if (c1.close < c1.open && body1 > range1*0.5 && body2 < range2*0.35 && c3.close > c3.open && body3 > range3*0.5 && c3.close > (c1.open+c1.close)/2) patterns.push({ name: 'Morning Star', dir: 'bull', score: 14 });
    // Evening Star: c1 bullish, c2 small, c3 bearish strong
    if (c1.close > c1.open && body1 > range1*0.5 && body2 < range2*0.35 && c3.close < c3.open && body3 > range3*0.5 && c3.close < (c1.open+c1.close)/2) patterns.push({ name: 'Evening Star', dir: 'bear', score: 14 });
    // Three White Soldiers
    const c_2 = n>=4 ? candles[n-4] : null;
    if (c1.close>c1.open && c2.close>c2.open && c3.close>c3.open && c2.close>c1.close && c3.close>c2.close && c2.open>c1.open && c3.open>c2.open) patterns.push({ name: 'Three White Soldiers', dir: 'bull', score: 14 });
    // Three Black Crows
    if (c1.close<c1.open && c2.close<c2.open && c3.close<c3.open && c2.close<c1.close && c3.close<c2.close && c2.open<c1.open && c3.open<c2.open) patterns.push({ name: 'Three Black Crows', dir: 'bear', score: 14 });

    return patterns;
}

// ── 3. SUPPORT / RESISTANCE ENGINE ─────────────────────────────

function detectSupportResistance(candles, price, atr) {
    if (!candles || candles.length < 30 || !atr) return { levels: [], nearSupport: false, nearResistance: false, score: 0 };
    const rc = candles.slice(-60);
    const tol = atr * 0.35;
    const levels = [];
    // Find pivot highs/lows
    for (let i = 2; i < rc.length - 2; i++) {
        const isPivotHigh = rc[i].high > rc[i-1].high && rc[i].high > rc[i-2].high && rc[i].high > rc[i+1].high && rc[i].high > rc[i+2].high;
        const isPivotLow  = rc[i].low  < rc[i-1].low  && rc[i].low  < rc[i-2].low  && rc[i].low  < rc[i+1].low  && rc[i].low  < rc[i+2].low;
        if (isPivotHigh) {
            const dup = levels.some(l => l.type === 'resistance' && Math.abs(l.price - rc[i].high) < tol);
            if (!dup) levels.push({ type: 'resistance', price: rc[i].high, touches: 1 });
            else { const lv = levels.find(l => l.type === 'resistance' && Math.abs(l.price - rc[i].high) < tol); if (lv) lv.touches++; }
        }
        if (isPivotLow) {
            const dup = levels.some(l => l.type === 'support' && Math.abs(l.price - rc[i].low) < tol);
            if (!dup) levels.push({ type: 'support', price: rc[i].low, touches: 1 });
            else { const lv = levels.find(l => l.type === 'support' && Math.abs(l.price - rc[i].low) < tol); if (lv) lv.touches++; }
        }
    }
    // Daily / weekly high/low proxies (extreme of lookback)
    const allHighs = rc.map(c=>c.high); const allLows = rc.map(c=>c.low);
    const periodHigh = Math.max(...allHighs); const periodLow = Math.min(...allLows);
    const nearResistance = levels.some(l => l.type === 'resistance' && Math.abs(price - l.price) < tol * 1.5);
    const nearSupport    = levels.some(l => l.type === 'support'    && Math.abs(price - l.price) < tol * 1.5);
    const nearPeriodHigh = Math.abs(price - periodHigh) < atr * 1.2;
    const nearPeriodLow  = Math.abs(price - periodLow)  < atr * 1.2;
    let score = 0;
    if (nearSupport || nearPeriodLow) score += 10;
    else if (nearResistance || nearPeriodHigh) score -= 10;
    return { levels, nearSupport: nearSupport || nearPeriodLow, nearResistance: nearResistance || nearPeriodHigh, periodHigh, periodLow, score };
}

// ── 4. ENHANCED SMART MONEY ENGINE ─────────────────────────────

function detectSmartMoneyConcepts(candles, price, atr) {
    if (!candles || candles.length < 20 || !atr) return { concepts: [], score: 0, premiumDiscount: 'MID', ote: false };
    const rc = candles.slice(-30);
    const concepts = [];
    let score = 0;

    // Equal Highs / Equal Lows
    const recentHighs = rc.slice(-10).map(c=>c.high); const recentLows = rc.slice(-10).map(c=>c.low);
    const maxH = Math.max(...recentHighs); const minL = Math.min(...recentLows);
    const eqHighCount = recentHighs.filter(h => Math.abs(h - maxH) < atr * 0.15).length;
    const eqLowCount  = recentLows.filter(l  => Math.abs(l  - minL) < atr * 0.15).length;
    if (eqHighCount >= 2) { concepts.push('Equal Highs'); score -= 5; }
    if (eqLowCount  >= 2) { concepts.push('Equal Lows');  score += 5; }

    // Liquidity Pool above/below
    if (price < minL + atr * 0.5 && eqLowCount >= 2)  { concepts.push('Liquidity Pool Below'); score += 8; }
    if (price > maxH - atr * 0.5 && eqHighCount >= 2) { concepts.push('Liquidity Pool Above'); score -= 8; }

    // Premium / Discount Zone (relative to swing range)
    const swingRange = maxH - minL;
    const equil = minL + swingRange * 0.5;
    const ote_lo = minL + swingRange * 0.618;
    const ote_hi = minL + swingRange * 0.786;
    const premiumDiscount = price > equil + swingRange * 0.1 ? 'PREMIUM' : price < equil - swingRange * 0.1 ? 'DISCOUNT' : 'MID';
    if (premiumDiscount === 'DISCOUNT') { concepts.push('Discount Zone'); score += 10; }
    if (premiumDiscount === 'PREMIUM')  { concepts.push('Premium Zone');  score -= 10; }

    // OTE (Optimal Trade Entry) — 61.8%–78.6% retracement
    const ote = price >= ote_lo - atr * 0.2 && price <= ote_hi + atr * 0.2;
    if (ote) { concepts.push('OTE Zone'); score += 8; }

    // Mitigation Block — strong opposite move after OB
    const bodies = rc.map(c=>Math.abs(c.close-c.open));
    const avgBody = bodies.reduce((a,b)=>a+b,0) / bodies.length;
    let mitigation = false;
    for (let i = 2; i < rc.length - 1; i++) {
        const bodyI = Math.abs(rc[i].close - rc[i].open);
        if (bodyI > avgBody * 2 && rc[i].close < rc[i].open) {
            // Check if price came back to that zone
            if (price >= rc[i].low - atr * 0.2 && price <= rc[i].open + atr * 0.2) {
                concepts.push('Mitigation Block'); score += 7; mitigation = true; break;
            }
        }
    }

    // Breaker Block — OB that price broke through then returned to
    let breaker = false;
    for (let i = 2; i < rc.length - 3; i++) {
        const bodyI = Math.abs(rc[i].close - rc[i].open);
        if (bodyI > avgBody * 1.5 && rc[i].close > rc[i].open) {
            const brokeThrough = rc.slice(i+1).some(c => c.low < rc[i].low);
            const retesting = price >= rc[i].low - atr * 0.25 && price <= rc[i].high + atr * 0.25;
            if (brokeThrough && retesting) { concepts.push('Breaker Block'); score -= 6; breaker = true; break; }
        }
    }

    // Inducement — small swings before a larger move
    const last5Lows = rc.slice(-5).map(c=>c.low); const min5Low = Math.min(...last5Lows);
    if (price > min5Low && price - min5Low < atr * 1.5) { concepts.push('Inducement Zone'); score += 6; }

    return { concepts, score: Math.max(-20, Math.min(20, score)), premiumDiscount, ote, swingHigh: maxH, swingLow: minL };
}

// ── 5. ENHANCED DIVERGENCE ENGINE ──────────────────────────────

function detectEnhancedDivergence(candles, closes, atr) {
    if (!candles || candles.length < 20) return { divergences: [], score: 0 };
    const divergences = [];
    let score = 0;
    const n = closes.length;
    const lb = Math.min(30, n);
    const pts = [];
    for (let i = n - lb; i < n; i++) {
        const r = calcRSI(closes.slice(0, i+1), 14);
        const cIdx = candles.length - (n - i);
        const c = (cIdx >= 0 && cIdx < candles.length) ? candles[cIdx] : null;
        if (r !== null && c) pts.push({ price: c.close, high: c.high, low: c.low, rsi: r, idx: i });
    }
    if (pts.length < 8) return { divergences, score };

    // Find swing points
    const swLows = [], swHighs = [];
    for (let i = 2; i < pts.length - 1; i++) {
        if (pts[i].low  <= pts[i-1].low  && pts[i].low  <= pts[i+1].low)  swLows.push(pts[i]);
        if (pts[i].high >= pts[i-1].high && pts[i].high >= pts[i+1].high) swHighs.push(pts[i]);
    }

    const rsiNow = calcRSI(closes, 14);
    if (rsiNow === null) return { divergences, score };

    // Regular Bullish Divergence: price lower low, RSI higher low
    if (swLows.length >= 2) {
        const sl1 = swLows[swLows.length-2], sl2 = swLows[swLows.length-1];
        if (sl2.price < sl1.price && sl2.rsi > sl1.rsi + 1.5) {
            divergences.push('Regular Bullish Div (RSI)'); score += 5;
        }
    }
    // Regular Bearish Divergence: price higher high, RSI lower high
    if (swHighs.length >= 2) {
        const sh1 = swHighs[swHighs.length-2], sh2 = swHighs[swHighs.length-1];
        if (sh2.price > sh1.price && sh2.rsi < sh1.rsi - 1.5) {
            divergences.push('Regular Bearish Div (RSI)'); score -= 5;
        }
    }
    // Hidden Bullish Divergence: price higher low, RSI lower low
    if (swLows.length >= 2) {
        const sl1 = swLows[swLows.length-2], sl2 = swLows[swLows.length-1];
        if (sl2.price > sl1.price && sl2.rsi < sl1.rsi - 1.5) {
            divergences.push('Hidden Bullish Div (RSI)'); score += 4;
        }
    }
    // Hidden Bearish Divergence: price lower high, RSI higher high
    if (swHighs.length >= 2) {
        const sh1 = swHighs[swHighs.length-2], sh2 = swHighs[swHighs.length-1];
        if (sh2.price < sh1.price && sh2.rsi > sh1.rsi + 1.5) {
            divergences.push('Hidden Bearish Div (RSI)'); score -= 4;
        }
    }

    // MACD Divergence using closing prices
    const macd = calcMACD(closes);
    if (macd && Math.abs(macd.hist) > 0) {
        if (macd.hist > 0 && rsiNow < 50)  { divergences.push('MACD Bull Cross'); score += 3; }
        if (macd.hist < 0 && rsiNow > 50)  { divergences.push('MACD Bear Cross'); score -= 3; }
    }

    return { divergences, score: Math.max(-10, Math.min(10, score)) };
}

// ── 6. VOLUME ENGINE ────────────────────────────────────────────

function calcVolumeEngine(candles) {
    if (!candles || candles.length < 10) return { label: 'UNKNOWN', relVol: 1, score: 0 };
    const rc = candles.slice(-10);
    const vols = rc.map(c => c.volume || 1);
    const avgVol = vols.slice(0,-1).reduce((a,b)=>a+b,0) / (vols.length-1);
    const lastVol = vols[vols.length-1];
    const relVol = avgVol > 0 ? lastVol / avgVol : 1;
    const lastC = candles[candles.length-1];
    const isBullCandle = lastC.close > lastC.open;

    // Buying vs Selling Pressure
    let buyVol = 0, sellVol = 0;
    for (const c of rc) {
        const range = c.high - c.low; if (range === 0) continue;
        const v = c.volume || 1;
        const up = (c.close - c.low) / range * v;
        const dn = (c.high - c.close) / range * v;
        buyVol += up; sellVol += dn;
    }
    const volDelta = (buyVol - sellVol) / (buyVol + sellVol + 0.0001);

    let label = 'NORMAL', score = 0;
    if (relVol > 2.0) { label = 'SPIKE'; score = isBullCandle ? 10 : -10; }
    else if (relVol > 1.4) { label = 'HIGH'; score = isBullCandle ? 6 : -6; }
    else if (relVol < 0.5) { label = 'LOW';  score = -3; }

    if (volDelta > 0.25) score += 5;
    else if (volDelta < -0.25) score -= 5;

    return { label, relVol: parseFloat(relVol.toFixed(2)), volDelta: parseFloat(volDelta.toFixed(3)), buyingPressure: volDelta > 0.1, sellingPressure: volDelta < -0.1, score: Math.max(-15, Math.min(15, score)) };
}

// ── 7. VOLATILITY ENGINE ────────────────────────────────────────

function calcVolatilityEngine(candles, closes, atr) {
    if (!candles || candles.length < 20 || !atr) return { label: 'NORMAL', bbWidth: 0, expansion: false, compression: false, score: 0, breakoutProb: 50 };
    const bb = calcBollingerBands(closes, 20, 2);
    if (!bb) return { label: 'NORMAL', bbWidth: 0, expansion: false, compression: false, score: 0, breakoutProb: 50 };

    // ATR relative to recent average ATR
    const rc = candles.slice(-20);
    const recentATRs = [];
    for (let i = 5; i < rc.length; i++) {
        const sl = rc.slice(i-5, i);
        const a = sl.reduce((acc, c, idx) => idx === 0 ? acc : acc + Math.max(c.high-c.low, Math.abs(c.high-sl[idx-1].close), Math.abs(c.low-sl[idx-1].close)), 0) / 4;
        recentATRs.push(a);
    }
    const avgATR = recentATRs.length > 0 ? recentATRs.reduce((a,b)=>a+b,0) / recentATRs.length : atr;
    const relATR = avgATR > 0 ? atr / avgATR : 1;

    const expansion   = bb.width > 3 || relATR > 1.3;
    const compression = bb.width < 1.5 || relATR < 0.7;
    const breakoutProb = compression ? Math.min(90, 50 + (1 - relATR) * 80) : Math.max(10, 50 - (relATR - 1) * 30);

    let label = 'NORMAL', score = 0;
    if (expansion)   { label = 'EXPANSION';   score = 3; }
    if (compression) { label = 'COMPRESSION'; score = 2; }
    if (bb.width < 0.8) { label = 'EXTREME_COMP'; score = 4; }

    return { label, bbWidth: parseFloat(bb.width.toFixed(2)), pctB: parseFloat(bb.pctB.toFixed(1)), expansion, compression, relATR: parseFloat(relATR.toFixed(2)), breakoutProb: Math.round(breakoutProb), score };
}

// ── 8. SCORING ENGINE (100 points) ─────────────────────────────
//  Market Structure: 20 | Trend: 15 | Momentum: 15 | Volume: 10
//  Candlestick: 10 | S/R: 10 | Smart Money: 10
//  Volatility: 5 | Divergence: 5 | Confluence: 10 = 100

function runPatternScoringEngine(id, price, macroCandles, microCandles, macroBias) {
    const scores = { structure: 0, trend: 0, momentum: 0, volume: 0, candle: 0, sr: 0, smc: 0, volatility: 0, divergence: 0, confluence: 0 };
    const reasoning = [];
    const atr = (macroBias && macroBias.atr) || (marketData[id] && marketData[id].atr) || (ATR_FALLBACK[id] || 300);
    const candles = macroCandles.length > 0 ? macroCandles : microCandles;
    if (!candles || candles.length < 10) return { signal: 'NEUTRAL', confidence: 0, scores, reasoning, patterns: [], direction: 'none' };

    const closes = candles.map(c=>c.close);
    const adx = calcADX(candles, 14) || 0;
    const rsi = calcRSI(closes, 14) || 50;
    const macd = calcMACD(closes);
    const cci = calcCCI(candles, 14);
    const stoch = calcStochastic(candles, 14, 3);
    const willR = calcWilliamsR(candles, 14);
    const ao = calcAO(candles);
    const roc = calcROC(closes, 10);
    const superTrend = calcSuperTrend(candles, 10, 3);

    // ── Market Structure (max 20) ──────────────────────────────
    const struct = calcBCStruct(candles);
    const structScore = struct.score || 0;
    if (structScore > 0) {
        scores.structure = Math.min(20, Math.round(structScore));
        reasoning.push(struct.struct.replace(/_/g,' '));
    } else if (structScore < 0) {
        scores.structure = Math.max(-20, Math.round(structScore));
        reasoning.push(struct.struct.replace(/_/g,' '));
    }
    if (struct.bos === 'BULL') reasoning.push('Break of Structure (Bull)');
    if (struct.bos === 'BEAR') reasoning.push('Break of Structure (Bear)');
    if (struct.choch) reasoning.push('Change of Character');

    // ── Trend (max 15) ─────────────────────────────────────────
    const trendData = macroBias && macroBias.factors ? macroBias.factors.bc_trend : null;
    const trendScore = (macroBias && macroBias.factors && macroBias.factors.bc_trend_score) || 0;
    const stScale = Math.min(15, Math.round(Math.abs(trendScore) * 15 / 30));
    scores.trend = trendScore > 0 ? stScale : (trendScore < 0 ? -stScale : 0);
    if (superTrend) {
        if (superTrend.bull) { scores.trend = Math.min(15, scores.trend + 3); reasoning.push('SuperTrend Bullish'); }
        else                 { scores.trend = Math.max(-15, scores.trend - 3); reasoning.push('SuperTrend Bearish'); }
    }
    if (macroBias && macroBias.factors && macroBias.factors.just_crossed) reasoning.push('EMA Cross Signal');

    // ── Momentum (max 15) ──────────────────────────────────────
    let momScore = 0;
    if (rsi < 30) { momScore += 12; reasoning.push(`RSI Oversold (${rsi.toFixed(0)})`); }
    else if (rsi < 45) { momScore += 6; reasoning.push(`RSI Pullback (${rsi.toFixed(0)})`); }
    else if (rsi > 70) { momScore -= 12; reasoning.push(`RSI Overbought (${rsi.toFixed(0)})`); }
    else if (rsi > 55) { momScore -= 6; }
    if (macd) {
        if (macd.hist > 0 && macd.line > 0) { momScore += 8; reasoning.push('MACD Bullish'); }
        else if (macd.hist > 0)             { momScore += 4; reasoning.push('MACD Cross Up'); }
        else if (macd.hist < 0 && macd.line < 0) { momScore -= 8; reasoning.push('MACD Bearish'); }
        else if (macd.hist < 0)             { momScore -= 4; }
    }
    if (cci !== null) {
        if (cci < -100) { momScore += 5; reasoning.push('CCI Oversold'); }
        else if (cci > 100) { momScore -= 5; reasoning.push('CCI Overbought'); }
    }
    if (stoch) {
        if (stoch.k < 20 && stoch.d < 20) { momScore += 5; reasoning.push('Stochastic Oversold'); }
        else if (stoch.k > 80 && stoch.d > 80) { momScore -= 5; reasoning.push('Stochastic Overbought'); }
    }
    if (willR !== null) {
        if (willR < -80) { momScore += 4; reasoning.push('Williams%R Oversold'); }
        else if (willR > -20) { momScore -= 4; }
    }
    if (ao !== null) {
        if (ao > 0) momScore += 3; else momScore -= 3;
    }
    scores.momentum = Math.max(-15, Math.min(15, Math.round(momScore * 15 / 25)));

    // ── Volume (max 10) ────────────────────────────────────────
    const volEng = calcVolumeEngine(candles);
    scores.volume = Math.max(-10, Math.min(10, Math.round(volEng.score * 10 / 15)));
    if (volEng.label === 'SPIKE') reasoning.push(`Volume Spike (${volEng.relVol}x)`);
    if (volEng.buyingPressure)  reasoning.push('Buying Pressure');
    if (volEng.sellingPressure) reasoning.push('Selling Pressure');

    // ── Candlestick (max 10) ───────────────────────────────────
    const allCandles = macroCandles.concat(microCandles.slice(-3));
    const cpats = detectCandlePatterns(allCandles.length >= 3 ? allCandles : candles);
    let candleScore = 0;
    let topCandlePat = null;
    for (const p of cpats) {
        if (p.dir === 'bull') { candleScore += p.score; if (!topCandlePat || p.score > topCandlePat.score) topCandlePat = p; }
        else if (p.dir === 'bear') { candleScore -= p.score; if (!topCandlePat || p.score > topCandlePat.score) topCandlePat = p; }
    }
    scores.candle = Math.max(-10, Math.min(10, Math.round(candleScore * 10 / 15)));
    if (topCandlePat) reasoning.push(topCandlePat.name);

    // ── Support / Resistance (max 10) ──────────────────────────
    const srData = detectSupportResistance(candles, price, atr);
    scores.sr = Math.max(-10, Math.min(10, srData.score));
    if (srData.nearSupport)    reasoning.push('Near Support Level');
    if (srData.nearResistance) reasoning.push('Near Resistance Level');

    // ── Smart Money (max 10) ───────────────────────────────────
    const smcData = detectSmartMoneyConcepts(candles, price, atr);
    scores.smc = Math.max(-10, Math.min(10, Math.round(smcData.score * 10 / 20)));
    for (const c of smcData.concepts.slice(0,2)) reasoning.push(c);
    if (smcData.ote) reasoning.push('OTE Zone');
    if (smcData.premiumDiscount === 'DISCOUNT') reasoning.push('Discount Zone');
    if (smcData.premiumDiscount === 'PREMIUM')  reasoning.push('Premium Zone');

    // ── Volatility (max 5) ─────────────────────────────────────
    const volat = calcVolatilityEngine(candles, closes, atr);
    scores.volatility = Math.max(-5, Math.min(5, volat.score));
    if (volat.compression) reasoning.push(`BB Compression (Breakout Prob: ${volat.breakoutProb}%)`);
    if (volat.expansion)   reasoning.push('Volatility Expansion');

    // ── Divergence (max 5) ─────────────────────────────────────
    const divEng = detectEnhancedDivergence(candles, closes, atr);
    scores.divergence = Math.max(-5, Math.min(5, divEng.score));
    for (const d of divEng.divergences.slice(0,2)) reasoning.push(d);

    // ── Confluence (max 10) ────────────────────────────────────
    const positiveCount = Object.values(scores).filter(v => v > 0).length;
    const negativeCount = Object.values(scores).filter(v => v < 0).length;
    if (positiveCount >= 6)       { scores.confluence = 10; reasoning.push('Strong Multi-Factor Confluence'); }
    else if (positiveCount >= 4)  { scores.confluence = 6; }
    else if (negativeCount >= 6)  { scores.confluence = -10; reasoning.push('Strong Bearish Confluence'); }
    else if (negativeCount >= 4)  { scores.confluence = -6; }
    else if (positiveCount >= 2 && negativeCount >= 2) { scores.confluence = 0; }

    // ── TOTAL SCORE & DIRECTION ────────────────────────────────
    const totalBull = Object.values(scores).reduce((a,v) => a + Math.max(0,v), 0);
    const totalBear = Object.values(scores).reduce((a,v) => a + Math.max(0,-v), 0);
    const netScore  = totalBull - totalBear;
    const maxPossible = 100;

    let signal = 'NEUTRAL', direction = 'none', confidence = 0;
    if (netScore >= 8) {
        signal = 'BUY'; direction = 'buy';
        confidence = Math.min(98, Math.round((totalBull / maxPossible) * 100 * 1.1));
    } else if (netScore <= -8) {
        signal = 'SELL'; direction = 'sell';
        confidence = Math.min(98, Math.round((totalBear / maxPossible) * 100 * 1.1));
    } else {
        confidence = Math.round(Math.max(totalBull, totalBear) / maxPossible * 100 * 0.7);
    }

    return { signal, direction, confidence, scores, totalBull, totalBear, netScore, reasoning, patterns: cpats, smcData, srData, volat, volEng, rsi, cci, stoch, willR, ao, roc, superTrend, atr };
}

// ── 9. FALSE SIGNAL FILTER ─────────────────────────────────────

function applyFalseSignalFilter(scored, candles) {
    if (!scored || scored.signal === 'NEUTRAL') return scored;
    const warns = [];
    const closes = candles.map(c=>c.close);
    const adx = calcADX(candles, 14);

    // 1. Sideway market (low ADX)
    if (adx !== null && adx < 18) { warns.push('ADX<18 (choppy)'); }

    // 2. Volatility too low
    if (scored.volat && scored.volat.bbWidth < 0.6) { warns.push('BBWidth<0.6 (flat)'); }

    // 3. Breakout without volume
    const bcStruct = calcBCStruct(candles);
    if (bcStruct.bos && scored.volEng && scored.volEng.relVol < 0.7) { warns.push('BOS no volume'); }

    // 4. Pattern incomplete (inside bar without direction)
    const hasNeutralDoji = scored.patterns.some(p => p.dir === 'neutral' && p.name === 'Doji');
    if (hasNeutralDoji && scored.confidence < 60) warns.push('Doji uncertainty');

    // 5. Signal against strong S/R
    if (scored.signal === 'BUY'  && scored.srData && scored.srData.nearResistance) warns.push('Entry near resistance');
    if (scored.signal === 'SELL' && scored.srData && scored.srData.nearSupport)    warns.push('Entry near support');

    // 6. Conflicting trend/structure (already handled in macroBias but double-check)
    if (scored.scores.trend > 5 && scored.scores.structure < -5) warns.push('Trend/struct conflict');
    if (scored.scores.trend < -5 && scored.scores.structure > 5) warns.push('Trend/struct conflict');

    // Penalize confidence for each warning
    const penalty = warns.length * 8;
    const adjConf = Math.max(0, scored.confidence - penalty);

    // If too many warnings, downgrade to NEUTRAL
    if (warns.length >= 4 || adjConf < 20) {
        return { ...scored, signal: 'NEUTRAL', confidence: adjConf, warnings: warns };
    }
    return { ...scored, confidence: adjConf, warnings: warns };
}

// ── 10. CONFIDENCE ENGINE ────────────────────────────────────────

function getConfidenceLabel(confidence, signal) {
    if (signal === 'NEUTRAL') return { label: 'NEUTRAL', color: 'var(--text-dim)' };
    if (confidence >= 90) return { label: 'EXCELLENT',   color: 'var(--emerald)' };
    if (confidence >= 78) return { label: 'VERY STRONG', color: 'var(--emerald)' };
    if (confidence >= 65) return { label: 'STRONG',      color: 'var(--gold)' };
    if (confidence >= 50) return { label: 'MODERATE',    color: 'var(--gold)' };
    if (confidence >= 35) return { label: 'WEAK',        color: 'var(--amber)' };
    return { label: 'VERY WEAK', color: 'var(--crimson)' };
}

function getRiskLabel(scored) {
    if (!scored) return { label: 'UNKNOWN', cls: 'medium' };
    const bullCount = Object.values(scored.scores).filter(v=>v>0).length;
    const bearCount = Object.values(scored.scores).filter(v=>v<0).length;
    const warns = (scored.warnings || []).length;
    if (scored.confidence >= 75 && warns === 0) return { label: 'LOW RISK',  cls: 'low' };
    if (scored.confidence >= 55 && warns <= 1)  return { label: 'MED RISK',  cls: 'medium' };
    return { label: 'HIGH RISK', cls: 'high' };
}

function getEntryQuality(scored) {
    if (!scored) return { label: 'POOR', cls: 'poor' };
    if (scored.confidence >= 80 && (scored.warnings||[]).length === 0) return { label: 'EXCELLENT', cls: 'excellent' };
    if (scored.confidence >= 60 && (scored.warnings||[]).length <= 1)  return { label: 'GOOD',      cls: 'good' };
    return { label: 'POOR', cls: 'poor' };
}

// ── 11. PATTERN DETECTION ENGINE — MAIN ─────────────────────────

let pdeCache = { btc: null };

function runPatternEngine(id, price, macroCandles, microCandles, macroBias) {
    try {
        let scored = runPatternScoringEngine(id, price, macroCandles, microCandles, macroBias);
        scored = applyFalseSignalFilter(scored, macroCandles.length > 0 ? macroCandles : microCandles);
        const confGrade = getConfidenceLabel(scored.confidence, scored.signal);
        const risk = getRiskLabel(scored);
        const eq = getEntryQuality(scored);

        // Build output object
        const output = {
            signal: scored.signal,
            confidence: scored.confidence,
            pattern: scored.patterns.length > 0 ? scored.patterns.map(p=>p.name).join(' + ') : (scored.signal !== 'NEUTRAL' ? 'Multi-Factor' : 'No Pattern'),
            trend: (macroBias && macroBias.factors && macroBias.factors.bc_trend) || 'NEUTRAL',
            momentum: scored.rsi < 35 ? 'Oversold' : scored.rsi > 65 ? 'Overbought' : 'Neutral',
            volume: (scored.volEng && scored.volEng.label) || 'NORMAL',
            volatility: (scored.volat && scored.volat.label) || 'NORMAL',
            market_structure: (macroBias && macroBias.factors && macroBias.factors.bc_struct) || 'UNCLEAR',
            confirmation: Object.values(scored.scores).filter(v=>v>0).length,
            rejection: (scored.warnings||[]).length > 0,
            entry_quality: eq.label,
            risk: risk.label,
            confidence_grade: confGrade.label,
            confidence_color: confGrade.color,
            risk_cls: risk.cls,
            eq_cls: eq.cls,
            scores: scored.scores,
            reasoning: scored.reasoning.slice(0,8),
            warnings: scored.warnings || [],
            patterns: scored.patterns,
            smcData: scored.smcData,
            srData: scored.srData,
            volat: scored.volat,
            // Macro trend direction for PDE display
            macro_bias: macroBias ? macroBias.bias : 'NEUTRAL',
            macro_bullPct: macroBias ? (macroBias.bullPct || 0) : 0,
            macro_bearPct: macroBias ? (macroBias.bearPct || 0) : 0
        };
        pdeCache[id] = output;
        return output;
    } catch(e) {
        return null;
    }
}
